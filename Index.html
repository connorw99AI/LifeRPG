function statOf(t="", b="") {
  const s = (t+" "+b).toLowerCase();
  if (/save|invest|budget|spend|money|debt|earn|income|financ|subscri/.test(s)) return "WLT";
  if (/habit|meditat|journal|focus|detox|phone|disciplin|streak|routine|plan/.test(s)) return "DIS";
  if (/workout|exercise|run|push|squat|stretch|gym|lift|cardio|fitness|sprint/.test(s)) return "STR";
  if (/read|learn|study|podcast|write|course|research|book|tutorial|lesson/.test(s)) return "INT";
  if (/connect|network|call|message|meet|social|talk|speak|present|friend/.test(s)) return "CHA";
  if (/sleep|eat|water|cold|meal|drink|breath|relax|recover|health|stress|vitality/.test(s)) return "VIT";
  return null;
}

// Advance XP through level-ups; returns [xp, level, didLevelUp]
function applyXP(xp, lv, gain) {
  let nx = xp + gain, nl = lv, lv2 = false;
  while (nx >= xpForLv(nl)) { nx -= xpForLv(nl); nl++; lv2 = true; }
  return [nx, nl, lv2];
}

// ─── MASTERY ──────────────────────────────────────────────────────
// Mastery now tracks completed skill journeys per stat category.
// Each completed skill journey adds to the count for its stat.
const MASTERY_TIERS = [
  { threshold:1,  tier:0, label:"Apprentice", icon:"🌱", mult:1.00, color:"#6B7280" },
  { threshold:3,  tier:1, label:"Adept",      icon:"🥉", mult:1.10, color:"#CD7F32" },
  { threshold:7,  tier:2, label:"Veteran",    icon:"🥈", mult:1.25, color:"#9CA3AF" },
  { threshold:15, tier:3, label:"Master",     icon:"🥇", mult:1.50, color:"#F59E0B" },
];
const getMastery    = count => [...MASTERY_TIERS].reverse().find(t => count >= t.threshold) || null;
const getMasteryXP  = (count, base) => { const m = getMastery(count); return Math.round(base * (m ? m.mult : 1)); };

// Build a map of stat → { count, journeys[] } from completed skill journeys
function buildSkillMastery(skillJourneys) {
  const map = {};
  SKEYS.forEach(k => { map[k] = { count:0, journeys:[] }; });
  (skillJourneys||[]).filter(j => j.complete).forEach(j => {
    const stat = j.stat || "INT";
    if (!map[stat]) map[stat] = { count:0, journeys:[] };
    map[stat].count++;
    map[stat].journeys.push(j.skill);
  });
  return map;
}

                 shuffle(boss.taunts.low)[0];

function getBossQuests(arcId, activeJourneyCount=1) {
  const pool  = BQ[arcId]||BQ.legend;
  const count = activeJourneyCount >= 3 ? 7 : activeJourneyCount >= 2 ? 5 : 3;
  return shuffle([...pool]).slice(0, count).map(q => ({ ...q, sd:0 }));
}

function getInitBossQuests(arcId) { return getBossQuests(arcId, 0); }

  if (!merged.bossQs || merged.bossQs.length === 0) {
    const activeCount = (merged.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length;

  if (merged.lastFightDate && merged.lastFightDate !== today()) {
    merged.bossQuestsToday = 0;
  }
  return merged;
};

// Shared response parser
function parseApiResponse(raw) {
  if (!raw?.trim()) throw new Error("Empty response. Try again.");
  let d = null;
  try { d = JSON.parse(raw.trim().replace(/^\uFEFF/,"")); }
  catch(_) {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) { try { d = JSON.parse(m[0]); } catch(_){} }
    if (!d) throw new Error("Could not parse response. Try again.");
  }
  if (d?.error) throw new Error(d.error.message||"API error. Try again.");
  const text = d?.content?.find?.(b=>b?.type==="text")?.text;
  if (!text) throw new Error("No text in response. Try again.");
  return text.trim();
}

// Sonnet: high-quality generation (journeys, profile summary, boss quests)
async function ai(prompt, maxTokens=1000) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:maxTokens, messages:[{role:"user",content:prompt}] }),
  });
  return parseApiResponse(await r.text());
}

// Haiku: fast tasks (skill quiz, daily review, coach reply, small JSON)
async function haiku(prompt, maxTokens=600) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-haiku-4-5-20251001", max_tokens:maxTokens, messages:[{role:"user",content:prompt}] }),
  });
  return parseApiResponse(await r.text());
}

// Robustly extract JSON object or array from a raw string
function parseJSON(raw) {
  if (!raw) throw new Error("Empty response from AI");
  // Strip markdown fences and normalise quotes
  const clean = raw
    .replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/, "")
    .replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"')
    .trim();
  const tryParse = s => {
    const attempts = [
      x => JSON.parse(x),
      x => JSON.parse(x.replace(/[\r\n\t]/g, " ")),
      x => JSON.parse(x.replace(/[\x00-\x1F\x7F]/g, " ")),
    ];
    for (const fn of attempts) { try { return fn(s); } catch(_) {} }
    return null;
  };
  const obj = clean.slice(clean.indexOf("{"), clean.lastIndexOf("}")+1);
  if (obj.length > 2) { const r=tryParse(obj); if (r) return r; }
  const arr = clean.slice(clean.indexOf("["), clean.lastIndexOf("]")+1);
  if (arr.length > 2) { const r=tryParse(arr); if (r) return r; }
  throw new Error("Could not parse AI response as JSON. Try again.");
}

async function genQuests(arcStat, profileSummary, goalsStr) {
  const others = ["STR","INT","CHA","DIS","WLT","VIT"].filter(s => s!==arcStat);
  const groups = [[arcStat,...others.slice(0,2)], others.slice(2)];
  const examples = { STR:"Work out 30 mins | Run 3km | Do 20 push-ups | Stretch 10 mins", INT:"Read for 20 mins | Watch a tutorial | Write 200 words | Listen to a podcast", CHA:"Call a friend | Send 3 messages | Attend an event | Give a compliment", DIS:"Meditate 10 mins | Journal today | No phone for 1 hour | Plan tomorrow", WLT:"Save £20 | Log expenses | Skip a purchase | Research one investment", VIT:"Drink 6 glasses of water | Sleep by 10:30pm | Eat a healthy meal | Cold shower" };
  async function fetchGroup(stats) {
    const prompt = `Daily quests for LifeRPG. Stats (2 quests each): ${stats.join(", ")}\n${stats.map(s=>`${s}: ${examples[s]||s}`).join("\n")}\n\nReturn JSON array only:\n[{id,stat,icon,title,e,ex,ec,ee,m,mx,mc,me,h,hx,hc,he}]`;
    const raw = await ai(prompt, 1000);
    const parsed = parseJSON(raw);
    if (!Array.isArray(parsed)) throw new Error("Expected array");
    return parsed;
  }
  const [g1, g2] = await Promise.all(groups.map(fetchGroup));
  return [...g1,...g2].map((q,i) => ({
    id:"dd_"+(q.id||i), stat:q.stat||arcStat, icon:q.icon||"⚡",
    baseTitle:q.title||"Complete a quest", repeatable:true, timeTag:"any",
    difficulties:[
      { label:"Easy",   title:String(q.e||"Easy task"),   xp:Number(q.ex)||25,  coins:Number(q.ec)||7,  est:String(q.ee||"10min") },
      { label:"Medium", title:String(q.m||"Medium task"), xp:Number(q.mx)||60,  coins:Number(q.mc)||15, est:String(q.me||"20min") },
      { label:"Hard",   title:String(q.h||"Hard task"),   xp:Number(q.hx)||110, coins:Number(q.hc)||28, est:String(q.he||"45min") },
    ],
  }));
}

async function genBossQuestsAI(arcName, arcStat, goals, bossName, bossLore, bossLevel, count, journeys=[], quizAnswers=[]) {
  const goalStr    = (goals||[]).slice(0,3).join(" | ") || "self-improvement";
  const goalCount  = Math.ceil(count * 0.65);
  const lifeCount  = count - goalCount;

  const journeyContext = (journeys||[])
    .filter(j => !j.complete && j.currentStep < (j.steps||[]).length)
    .slice(0, 3)
    .map(j => {
      const pct        = Math.round((j.currentStep / j.steps.length) * 100);
      const doneTitles = j.steps.filter(s=>s.done).map(s=>s.title);
      const nextTitle  = j.steps[j.currentStep]?.title||"";
      return `Goal: "${j.goalText}" — ${pct}% through (step ${j.currentStep+1}/${j.steps.length})\n`+
             (doneTitles.length?`  Already done: ${doneTitles.slice(-3).join("; ")}\n`:"")+
             (nextTitle?`  Next step: "${nextTitle}"\n`:"");
    }).join("\n");

  const quizContext = (quizAnswers||[]).slice(0,8).join("; ");

  const LIFESTYLE = [
    { icon:"💧", baseTitle:"Hydrate",         task:"Drink 8 glasses of water today",                   dmg:10, xp:50, coins:14 },
    { icon:"😴", baseTitle:"Sleep on time",   task:"In bed by 10:30pm, phone out of the bedroom",      dmg:10, xp:50, coins:14 },
    { icon:"🥗", baseTitle:"Eat clean",       task:"No junk food or takeaway today",                   dmg:10, xp:50, coins:14 },
    { icon:"📵", baseTitle:"Phone-free hour", task:"No social media for 1 hour straight",              dmg:10, xp:50, coins:14 },
    { icon:"🧘", baseTitle:"10-min reset",    task:"10 minutes of meditation or deep breathing",       dmg:10, xp:50, coins:14 },
    { icon:"🚶", baseTitle:"Walk it out",     task:"Walk for 20 minutes without your phone",           dmg:10, xp:50, coins:14 },
    { icon:"📓", baseTitle:"Journal entry",   task:"Write 5 minutes — what is actually on your mind", dmg:10, xp:50, coins:14 },
    { icon:"🚫", baseTitle:"No-spend day",    task:"No non-essential purchases today",                 dmg:10, xp:50, coins:14 },
  ];
  const lifePick = shuffle([...LIFESTYLE]).slice(0, lifeCount).map((q,i) => ({
    id:`bq_ls_${Date.now()}_${i}`, icon:q.icon, baseTitle:q.baseTitle,
    task:q.task, dmg:q.dmg, xp:q.xp, coins:q.coins, stat:"VIT", sd:0,
  }));

  const arr = parseJSON(await ai(
    `You are a quest designer for LifeRPG.\n`+
    `Boss: "${bossName}" (${arcName} arc) — "${bossLore}"\n`+
    `Boss level: ${bossLevel} of 5 (1=beginner quests, 5=near-goal performance quests)\n\n`+
    `PLAYER JOURNEY PROGRESS:\n${journeyContext||"No active journeys yet."}\n`+
    (quizContext?`PLAYER STARTING LEVEL:\n${quizContext}\n`:"") +
    `\nWrite ${goalCount} side quests that:\n`+
    `1. Directly attack THIS boss's specific psychological weakness\n`+
    `2. Are calibrated to boss level ${bossLevel}/5 — level 1 is easy, level 5 is close to the player's final goal\n`+
    `3. Are based on what the player has ALREADY DONE (not what the goal eventually requires)\n\n`+
    `FORMAT RULES:\n`+
    `- baseTitle: 1-3 words, starts with a verb\n`+
    `- task: one clean sentence, starts with a verb, no justifications or proof conditions\n`+
    `- icon: relevant emoji\n`+
    `- xp: 50, coins: 14, dmg: 10\n\n`+
    `BAD: "Read three pages with your phone in another room and screen time app open"\n`+
    `GOOD: "Read three pages of any book you own"\n\n`+
    `Return ONLY a JSON array:\n`+
    `[{"id":"bq_g1","icon":"🏃","baseTitle":"Run 3 min","task":"Run for 3 minutes without stopping","xp":50,"coins":14,"dmg":10,"stat":"STR"}]`,
    1400
  ));

  if (!Array.isArray(arr)) throw new Error("Parse failed");
  const goalQuests = arr.slice(0, goalCount).map((q,i) => ({
    id:`bq_g_${Date.now()}_${i}`,
    icon:q.icon||"⚔️",
    baseTitle:String(q.baseTitle||"Quest").slice(0,20),
    task:String(q.task||"Complete the task"),
    dmg:10, xp:50, coins:14,
    stat:q.stat||arcStat,
    sd:0,
  }));

  const result = [];
  let gi=0, li=0;
  while (gi < goalQuests.length || li < lifePick.length) {
    if (gi < goalQuests.length) result.push(goalQuests[gi++]);
    if (gi < goalQuests.length) result.push(goalQuests[gi++]);
    if (li < lifePick.length)   result.push(lifePick[li++]);
  }
  return result.slice(0, count);
}

// Pure insight computation — no AI
async function genGoalQuiz(goalText, arcName, previousQuestions=[]) {
  const excludeStr = previousQuestions.length > 0
    ? `\nNEVER ask these questions again (already asked):\n${previousQuestions.slice(-20).map(q=>`- ${q}`).join("\n")}`
    : "";
  const raw = await ai(
    `LifeRPG intake quiz. Arc: ${arcName}. Goal: "${goalText}"\n`+
    `Generate 5 questions that reveal real detail about this person relevant to THIS specific goal.\n`+
    `Topics: their current situation, obstacles, past attempts, lifestyle context, identity around this goal.\n`+
    `Options must sound like real people talking — not survey answers. Be specific to the goal.\n`+
    excludeStr+
    `\nRETURN ONLY A RAW JSON ARRAY — nothing before [, nothing after ]. No keys, no wrapper object.\n`+
    `CORRECT FORMAT: [{"q":"...","opts":["...","...","...","..."]},...]\n`+
    `WRONG FORMAT: {"questions":[...]} or any object wrapper.\n`+
    `Start your response with [ and end with ].`, 1400);

  // Extract array even if model wraps it in an object
  let parsed = null;
  try {
    const clean = raw.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();
    // Try direct array parse first
    const arrStart = clean.indexOf("[");
    const arrEnd   = clean.lastIndexOf("]");
    if (arrStart !== -1 && arrEnd > arrStart) {
      try { parsed = JSON.parse(clean.slice(arrStart, arrEnd+1)); } catch(_) {}
    }
    // Fallback: full parse and unwrap common wrappers
    if (!Array.isArray(parsed)) {
      const obj = JSON.parse(clean);
      if (Array.isArray(obj)) parsed = obj;
      else if (Array.isArray(obj.questions)) parsed = obj.questions;
      else if (Array.isArray(obj.quiz)) parsed = obj.quiz;
      else throw new Error("Response was an object, not an array");
    }
  } catch(e) {
    throw new Error("Quiz generation failed — " + e.message);
  }

  if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("Parse failed — empty or invalid array");
  // Validate structure
  const valid = parsed.filter(q => q.q && Array.isArray(q.opts) && q.opts.length >= 2);
  if (valid.length === 0) throw new Error("Questions missing required fields");
  return valid.slice(0, 5);
}

// Concurrency-limited parallel execution — never more than `limit` promises in flight
async function parallelLimit(tasks, limit=2) {
  const results = [];
  const executing = [];
  for (const task of tasks) {
    const p = Promise.resolve().then(task);
    results.push(p);
    if (limit <= tasks.length) {
      const e = p.finally(() => executing.splice(executing.indexOf(e), 1));
      executing.push(e);
      if (executing.length >= limit) await Promise.race(executing);
    }
  }
  return Promise.allSettled(results);
}

// ─── RADAR CHART ──────────────────────────────────────────────────
function Radar({ stats, size=200 }) {
  const cx=size/2, cy=size/2, r=(size/2)*0.78;
  const sl=[["STR",T.red],["INT",T.blue],["CHA",T.orange],["WLT",T.mint],["VIT",T.pink],["DIS",T.purple]];
  const ang = i => (Math.PI*2*i/sl.length)-Math.PI/2;
  const pt  = (i,v,R) => { const a=ang(i),d=(v/100)*R; return [cx+d*Math.cos(a), cy+d*Math.sin(a)]; };
  const gp  = (ring,R) => sl.map((_,i) => { const [x,y]=pt(i,ring,R); return `${x},${y}`; }).join(" ");
  const vp  = sl.map(([k],i) => { const [x,y]=pt(i,stats[k]||30,r); return `${x},${y}`; }).join(" ");
  return (
    <svg width={size} height={size} style={{ display:"block", margin:"0 auto" }}>
      {[20,40,60,80,100].map(ring => <polygon key={ring} points={gp(ring,r)} fill="none" stroke={T.border} strokeWidth={0.8}/>)}
      {sl.map((_,i) => { const [x,y]=pt(i,100,r); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={T.border} strokeWidth={0.8}/>; })}
      <polygon points={vp} fill={T.purple+"33"} stroke={T.purple} strokeWidth={2}/>
      {sl.map(([k,c],i) => {
        const [x,y]=pt(i,stats[k]||30,r), [lx,ly]=pt(i,118,r);
        return <g key={k}><circle cx={x} cy={y} r={4} fill={c}/><text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={c} fontWeight={700}>{k}</text></g>;
      })}
    </svg>
  );
}

// ─── GOAL QUIZ ───────────────────────────────────────────────────
function GoalQuiz({ goalText, arcName, previousQuestions, onComplete, onBack }) {
  const [phase,setPhase]   = useState("gen");
  const [questions,setQs]  = useState([]);
  const [qi,setQi]         = useState(0);
  const [answers,setAns]   = useState({});
  const [err,setErr]       = useState("");
  const arc = getArc(ARCS.find(a=>a.name===arcName)?.id||"iron");
  const attemptRef = useRef(0);

  function runGeneration() {
    attemptRef.current += 1;
    setErr(""); setPhase("gen");
    (async()=>{
      try {
        const qs = await genGoalQuiz(goalText, arcName, previousQuestions||[]);
        setQs(qs); setPhase("quiz");
      } catch(e) {
        if (attemptRef.current < 3) {
          await new Promise(res=>setTimeout(res, 1200));
          runGeneration();
        } else {
          setErr(e.message||"Failed to generate quiz");
          setPhase("error");
        }
      }
    })();
  }

  useEffect(()=>{ runGeneration(); },[]);

  function answer(optIdx) {
    const next = {...answers, [qi]: questions[qi].opts[optIdx]};
    setAns(next);
    if (qi < questions.length-1) { setTimeout(()=>setQi(x=>x+1), 240); }
    else { setPhase("done"); setTimeout(()=>onComplete(Object.values(next), questions.map(q=>q.q)), 600); }
  }

  if (phase==="gen") return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ fontSize:36, marginBottom:16 }}>🔬</div>
      <div style={{ fontSize:16, fontWeight:700, marginBottom:8, textAlign:"center" }}>Understanding your goal…</div>
      <div style={{ fontSize:11, color:T.textSecondary, textAlign:"center", lineHeight:1.6, maxWidth:280 }}>
        Generating 5 questions specific to: <span style={{ color:arc.color }}>"{goalText}"</span>
      </div>
    </div>
  );

  if (phase==="error") return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ fontSize:36, marginBottom:16 }}>⚠️</div>
      <div style={{ fontSize:14, fontWeight:700, marginBottom:8, color:T.red }}>Quiz generation failed</div>
      <div style={{ fontSize:11, color:T.textSecondary, textAlign:"center", lineHeight:1.6, marginBottom:20, maxWidth:300 }}>{err}</div>
      <div style={{ display:"flex", gap:8 }}>
        <div onClick={()=>{ attemptRef.current=0; runGeneration(); }}
          style={{ background:arc.color, borderRadius:8, padding:"10px 18px", fontSize:12, color:T.void, fontWeight:700, cursor:"pointer" }}>Try Again</div>
        <div onClick={onBack}
          style={{ background:T.border, borderRadius:8, padding:"10px 18px", fontSize:12, color:T.textSecondary, fontWeight:700, cursor:"pointer" }}>← Skip</div>
      </div>
    </div>
  );

  if (phase==="done") return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ fontSize:48, marginBottom:12 }}>✓</div>
      <div style={{ fontSize:16, fontWeight:700 }}>Building your journey…</div>
    </div>
  );

  const q = questions[qi];
  return (

      </div>
      <div style={{ display:"flex", alignItems:"flex-start", gap:10, marginBottom:16 }}>
        {qi > 0 && <span onClick={()=>setQi(x=>x-1)} style={{ fontSize:22, color:T.textMuted, cursor:"pointer", flexShrink:0 }}>←</span>}
        <div style={{ fontSize:14, fontWeight:700, lineHeight:1.5, flex:1 }}>{q.q}</div>

        const sel = answers[qi]===o;
        return <div key={i} onClick={()=>answer(i)} style={{ padding:"11px 14px", borderRadius:9, marginBottom:8, cursor:"pointer",
          background:sel?arc.color+"33":T.card, border:"1px solid "+(sel?arc.color:T.border), fontSize:12, color:sel?arc.color:T.textSecondary }}>{o}</div>;
      })}
      <div style={{ fontSize:9, color:T.textMuted, textAlign:"center", marginTop:4 }}>Q{qi+1} / {questions.length}</div>
    </div>
  );
}

// ─── PIN ENTRY ────────────────────────────────────────────────────
function PinEntry({ label, onConfirm, onBack, error }) {
  const [digits, setDigits] = useState([]);
  useEffect(() => { if (error) setDigits([]); }, [error]);
  function tap(d) {
    if (digits.length >= 4) return;
    const next = [...digits, d];
    setDigits(next);
    if (next.length === 4) setTimeout(() => onConfirm(next.join("")), 200);
  }
  function del() { setDigits(d => d.slice(0,-1)); }
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", background:T.void, padding:24 }}>
      <div style={{ fontSize:14, fontWeight:700, marginBottom:8, color:T.textPrimary }}>{label}</div>
      <div style={{ display:"flex", gap:12, marginBottom:24 }}>
        {[0,1,2,3].map(i => <div key={i} style={{ width:16, height:16, borderRadius:"50%", background:digits[i]!==undefined?T.gold:T.border }}/>)}
      </div>
      {error && <div style={{ fontSize:11, color:T.red, marginBottom:16 }}>{error}</div>}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, maxWidth:240, width:"100%" }}>
        {[1,2,3,4,5,6,7,8,9].map(n => (
          <div key={n} onClick={()=>tap(String(n))} style={{ background:T.card, border:"1px solid "+T.border, borderRadius:12, height:60, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:700, cursor:"pointer" }}>{n}</div>
        ))}
        <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:12, height:60, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, color:T.textMuted, cursor:"pointer" }} onClick={onBack}>←</div>
        <div onClick={()=>tap("0")} style={{ background:T.card, border:"1px solid "+T.border, borderRadius:12, height:60, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:700, cursor:"pointer" }}>0</div>
        <div style={{ background:T.card, border:"1px solid "+T.red+"44", borderRadius:12, height:60, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, cursor:"pointer" }} onClick={del}>⌫</div>
      </div>
    </div>
  );
}

function Onboarding({ onComplete }) {
  const [step,setStep]      = useState(0);
  const [gender,setGender]  = useState("");
  const [name,setName]      = useState("");
  const [age,setAge]        = useState("");
  const [avatar,setAv]      = useState(0);

  const [loadIn,setLI]      = useState("");
  const [loadPin,setLPin]   = useState("");
  const [loadErr,setLE]     = useState("");
  const [loadStep,setLS]    = useState("username"); // username | pin

    {e:"🧛‍♂️",l:"Vampire"},{e:"🏋️‍♂️",l:"Athlete"},{e:"👨‍🚀",l:"Astronaut"},{e:"🕵️‍♂️",l:"Detective"},

    {e:"🤖",l:"Robot"},{e:"💀",l:"Skull"},{e:"👽",l:"Alien"},{e:"👨‍💻",l:"Tech Wiz"},
    {e:"🧌",l:"Troll"},{e:"🧙‍♂️",l:"Wizard"},
  ];
  const AVTS_FEMALE  = [
    {e:"🧛‍♀️",l:"Vampire"},{e:"🏋️‍♀️",l:"Athlete"},{e:"👩‍🚀",l:"Astronaut"},{e:"🕵️‍♀️",l:"Detective"},
    {e:"👻",l:"Ghost"},{e:"🥷",l:"Ninja"},{e:"👸",l:"Princess"},{e:"👩‍🎤",l:"Punk"},
    {e:"🤖",l:"Robot"},{e:"💀",l:"Skull"},{e:"👽",l:"Alien"},{e:"👩‍💻",l:"Tech Wiz"},
    {e:"🧌",l:"Troll"},{e:"🧙‍♀️",l:"Witch"},
  ];
  const AVTS_NEUTRAL = [
    {e:"🧑‍🚀",l:"Astronaut"},{e:"👽",l:"Alien"},{e:"👻",l:"Ghost"},
    {e:"🥷",l:"Ninja"},{e:"🤖",l:"Robot"},{e:"💀",l:"Skull"},{e:"🧌",l:"Troll"},
  ];
  const AVTS = gender==="male"?AVTS_MALE:gender==="female"?AVTS_FEMALE:AVTS_NEUTRAL;

  async function tryLoad(enteredPin) {
    const t = loadIn.trim().toUpperCase();
    if (!t) { setLE("Enter your username."); return; }
    const s = await loadUN(t);
    if (!s) { setLE(`No save found for "${t}".`); return; }
    if (s.char?.pin && s.char.pin !== enteredPin) { setLE("Incorrect PIN."); setLS("username"); return; }
    onComplete(null, null, s);
  }

  // PIN set step — need two matching entries
  if (step===6 && !pin) return (
    <PinEntry label="Set your 4-digit PIN" onConfirm={p=>setPin(p)} onBack={()=>setStep(5)}/>
  );
  if (step===6 && pin && !confirmPin) return (
    <PinEntry key={"confirm-"+pin} label="Confirm your PIN" onConfirm={p=>{ if(p===pin){setCPin(p); onComplete({name:name.trim().toUpperCase(),age:parseInt(age)||25,avatar:AVTS[avatar].e,gender,arcId},un,null,pin);} else {setPin(""); setPinErr("PINs didn't match — try again.");}}} onBack={()=>setPin("")} error={pinErr}/>
  );

  const Page = ({children}) => <div style={{ display:"flex", flexDirection:"column", minHeight:"100vh", background:T.void, color:T.textPrimary, padding:"28px 16px" }}>{children}</div>;

    </div>
  );

  // Step 0 — Gender
  if (step===0) return (
    <Page>
      <StepDots n={1}/>
      <div style={{ fontSize:24, fontWeight:900, marginBottom:4, textAlign:"center" }}>How do you identify?</div>
      <div style={{ fontSize:11, color:T.textSecondary, marginBottom:28, textAlign:"center" }}>Filters your avatar options.</div>
      <div style={{ flex:1 }}>
        {[["male","Male","🤴"],["female","Female","👸"],["neutral","No Preference","⚔️"]].map(([val,label,em])=>(
          <div key={val} onClick={()=>setGender(val)} style={{ background:gender===val?T.gold+"22":T.card, border:"2px solid "+(gender===val?T.gold:T.border), borderRadius:14, padding:"18px 20px", marginBottom:12, cursor:"pointer", display:"flex", alignItems:"center", gap:16 }}>
            <span style={{ fontSize:32 }}>{em}</span>
            <span style={{ fontSize:16, fontWeight:700, color:gender===val?T.gold:T.textPrimary }}>{label}</span>
          </div>
        ))}
      </div>

      <div onClick={()=>setLO(true)} style={{ textAlign:"center", padding:12, marginTop:10, border:"1px solid "+T.border, borderRadius:10, cursor:"pointer", fontSize:12, color:T.textSecondary }}>↩ Load Saved Game</div>
      {loadOpen && <Modal onClose={()=>{ setLO(false); setLS("username"); setLE(""); }}>
        <div style={{ fontSize:16, fontWeight:700, marginBottom:4 }}>Load Saved Game</div>
        {loadStep==="username" && <>
          <input value={loadIn} onChange={e=>{ setLI(e.target.value.toUpperCase()); setLE(""); }} placeholder="Your username…"
            style={{ width:"100%", background:T.card, border:"1px solid "+(loadErr?T.red:T.border), borderRadius:10, padding:"12px 14px", fontSize:14, color:T.textPrimary, outline:"none", marginBottom:loadErr?8:14, boxSizing:"border-box" }}/>
          {loadErr && <div style={{ fontSize:11, color:T.red, marginBottom:12 }}>{loadErr}</div>}
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={async()=>{ const t=loadIn.trim().toUpperCase(); if(!t){setLE("Enter username.");return;} const s=await loadUN(t); if(!s){setLE(`No save for "${t}".`);return;} if(s.char?.pin){setLS("pin");}else{onComplete(null,null,s);} }} style={{ flex:2 }}>Next</Btn>
            <Btn onClick={()=>{ setLO(false); setLS("username"); setLE(""); }} color={T.border} style={{ flex:1 }}>Cancel</Btn>
          </div>
        </>}
        {loadStep==="pin" && <PinEntry label="Enter your PIN" onConfirm={p=>tryLoad(p)} onBack={()=>{ setLS("username"); setLE(""); }} error={loadErr}/>}
      </Modal>}
    </Page>
  );

  // Step 1 — Name + Age + Avatar
  if (step===1) return (
    <NameStep name={name} age={age} avatar={avatar} AVTS={AVTS} setAv={setAv}
      onBack={()=>setStep(0)}
      onNext={(n,a)=>{ setName(n); setAge(a); setStep(2); }}/>
  );

  // Step 2 — Arc
  if (step===2) return (
    <Page>
      <StepDots n={3}/>
      <div style={{ fontSize:24, fontWeight:900, marginBottom:6, textAlign:"center" }}>Your arc</div>
      <div style={{ fontSize:11, color:T.textSecondary, marginBottom:14, textAlign:"center" }}>Your arc shapes your boss battles and story.</div>
      <div style={{ flex:1, overflowY:"auto", scrollbarWidth:"none" }}>
        {ARCS.map(a => {
          const sel = arcId===a.id;
          return (
            <div key={a.id} onClick={()=>setArc(a.id)} style={{ background:sel?a.color+"18":T.card, border:"2px solid "+(sel?a.color:"transparent"), borderRadius:14, padding:"14px 16px", marginBottom:10, cursor:"pointer" }}>

                </div>
              </div>
              {sel && <div style={{ fontSize:11, color:T.textSecondary, lineHeight:1.6 }}>{a.desc}</div>}
            </div>
          );
        })}
      </div>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <Btn onClick={()=>setStep(1)} color={T.border} style={{ flex:1 }}>← Back</Btn>
        <Btn onClick={()=>{ if(arcId) setStep(3); }} disabled={!arcId} style={{ flex:2 }}>NEXT →</Btn>
      </div>
    </Page>
  );

  // Step 3 — Username
  if (step===3) return (
    <UsernameStep name={name.trim().toUpperCase()} arcId={arcId} un={un} setUN={setUN}
      onBack={()=>setStep(2)}
      onNext={(v)=>{ setUN(v); setStep(6); }}/>
  );

  return null;
}


// ─── GAME ENGINE ──────────────────────────────────────────────────
function useGame() {
  const [g,setG]             = useState(null);
  const [loaded,setLd]       = useState(false);
  const [toast,setToast]     = useState(null);
  const [achPopup,setAchPopup] = useState(null);
  const notify  = useCallback(msg => { setToast(msg); setTimeout(()=>setToast(null),2800); }, []);
  const showAch = useCallback(id  => { const a=ACHIEVEMENTS.find(x=>x.id===id); if(a){setAchPopup(a);setTimeout(()=>setAchPopup(null),4200);} }, []);

  // Load last save on mount
  useEffect(() => {
    (async () => {
      try { const last=await getLastUN(); if(last){ const s=await loadUN(last); if(s){ setG(normalise(s)); setLd(true); return; }}} catch(_){}
      setLd(true);
    })();
  }, []);

  const save = useCallback(async next => {
    if (!Array.isArray(next.weeklyReviews)) next = {...next, weeklyReviews:[]};
    setG(next); await persist(next); await setLastUN(next.un);
  }, []);

  // Award any newly-unlocked achievements and queue toasts
  const award = useCallback((next) => {
    const newOnes = checkAchievements(next);
    if (!newOnes.length) return next;
    const updated = {...next, achievements:[...new Set([...(next.achievements||[]),...newOnes])]};
    persist(updated);
    setTimeout(() => newOnes.forEach((id,i) => setTimeout(()=>showAch(id), i*4500)), 100);
    return updated;
  }, [showAch]);

  // Daily / weekly reset
  useEffect(() => {
    if (!g||!loaded) return;
    const t = today();
    if (g.lastReset !== t) {
      const had         = Object.keys(g.dDone||{}).length > 0;
      const boss        = getBoss(g.arc, g.bossIdx||0);
      const bi          = g.bossIdx||0;
      let   bh          = g.bossHp;
      if (bh > 0 && !g.bossFrozen) bh = Math.min(boss.maxHp, bh+boss.regen);

      // Activity log
      const log = {...(g.actLog||{})}; if (had) log[g.lastReset]=Object.keys(g.dDone).length;

      // Streak shield
      const hadStreak    = g.streak > 0;
      const shieldActive = (g.bag||[]).some(b=>b.id==="streaksh");
      let   newStreak    = had ? g.streak+1 : Math.max(0,g.streak-1);
      let   newBag       = g.bag||[];
      let   shieldsUsed  = g.shieldsUsed||0;
      if (!had && hadStreak && shieldActive) {
        newStreak   = g.streak;
        newBag      = newBag.filter(b=>b.id!=="streaksh");
        shieldsUsed += 1;
      }

      // Stat decay
      const statsDone = new Set(Object.keys(g.dDone||{}).map(qid=>(g.daily||[]).find(x=>x.id===qid)?.stat).filter(Boolean));
      const stats     = {...g.stats};
      SKEYS.forEach(k => { if (!statsDone.has(k)&&(stats[k]||30)>10) stats[k]=Math.max(10,(stats[k]||30)-1); });

      // Login bonus XP
      const bonus = calcLoginBonus(newStreak);
      const [nx,nl] = applyXP(g.xp, g.lv, bonus.xp);

      save({...g, dDone:{}, bqDone:{}, bossQs:getBossQuests(g.arc,(g.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length),
        lastReset:t, bossHp:bh, bossIdx:bi, actLog:log,
        momentum:Math.max(0,g.momentum-10), streak:newStreak, stats, bag:newBag, shieldsUsed,
        skillProg:{STR:0,INT:0,CHA:0,DIS:0,WLT:0,VIT:0}, skillUsed:[],
        bossQuestsToday:0, bossRageUntil:0, lastFightDate:null,
        bossFrozen:Math.max(0,(g.bossFrozen||0)-1), checkin:null, bqTotalDone:0,
        bossUnlocksAt:null, bossDefeated:null,
        xp:nx, lv:nl, totalXP:g.totalXP+bonus.xp, coins:g.coins+bonus.coins, loginBonusClaimed:t});

      if (shieldActive && !had) setTimeout(()=>notify("🛡️ Streak Shield saved your streak!"),500);
      return;
    }
    const mon = monday();
    if (g.lastWeekReset!==mon) save({...g, lastWeekReset:mon});
  }, [g, loaded]);

  // Simple patch helper
  const up = useCallback((patch, msg) => setG(prev => {
    if (!prev) return prev;
    const s = {...prev, ...patch};
    persist(s);
    if (msg) setTimeout(()=>notify(msg),0);
    return s;
  }), [notify]);

  // ── Actions ──

  const completeJourneyStep = useCallback((journeyId, note="") => setG(prev => {
    if (!prev) return prev;
    const j = (prev.journeys||[]).find(x=>x.id===journeyId);
    if (!j || j.complete) return prev;
    const si   = j.currentStep;
    const step = j.steps[si];
    if (!step || step.done) return prev;
    const xpGain   = step.xp||50;
    const [nx,nl,lv] = applyXP(prev.xp, prev.lv, xpGain);
    const stats    = {...prev.stats}; stats[j.stat]=Math.min(100,(stats[j.stat]||0)+Math.ceil(xpGain/20));
    const sp       = {...prev.skillProg}; sp[j.stat]=(sp[j.stat]||0)+1;
    const nextStep = si+1;
    const complete = nextStep >= j.steps.length;
    const updJ     = {...j, steps:j.steps.map((s,i)=>i===si?{...s,done:true,doneDate:today(),note:note.trim()}:s), currentStep:nextStep, complete};
    const journeys = (prev.journeys||[]).map(x=>x.id===journeyId?updJ:x);
    const entry    = {id:step.id,baseTitle:step.title,stat:j.stat,at:Date.now(),diff:"Journey",xpEarned:xpGain,note:note.trim(),journeyGoal:j.goalText,icon:j.icon||"⚡"};
    const base     = {...prev,xp:nx,totalXP:(prev.totalXP||0)+xpGain,lv:nl,coins:(prev.coins||0)+(step.coins||12),
      stats,skillProg:sp,momentum:Math.min(100,(prev.momentum||0)+5),journeys,qDone:(prev.qDone||0)+1,
      history:[...(prev.history||[]).slice(-199),entry],
    };
    const s = award(base); persist(s);
    setTimeout(()=>notify(complete?`🏆 Journey complete! "${j.goalText}"`:lv?`LEVEL UP! Lv.${nl}`:
      `+${xpGain}XP · Step ${nextStep}/${j.steps.length}`),0);
    return s;
  }),[notify,award]);

  const addJourney = useCallback(journey => setG(prev => {
    if (!prev) return prev;
    const s = {...prev, journeys:[...(prev.journeys||[]), journey]};
    persist(s); return s;
  }), []);

  const startGame = useCallback(async (char, un) => {
    const state = initState(char, un);
    if (char.quizAnswers) state.quizAnswers = char.quizAnswers;
    await save(state);
    const arc = getArc(char.arcId);
    const goals = char.goals||[];
    const quizSummary = (char.quizAnswers||[]).map((a,i)=>`A${i+1}: ${a}`).join("\n");
    goals.forEach(async (goalText, idx) => {
      try {
        const others = goals.filter((_,i)=>i!==idx);
        const raw = await genJourney(goalText, arc.name, quizSummary, others);
        const journey = {
          id: `j_${Date.now()}_${idx}`,
          goalText, stat: statOf(goalText)||arc.stat,
          icon: getJourneyIcon(statOf(goalText)||arc.stat),
          steps: raw.map((s,i) => ({ id:`s_${idx}_${i}`, title:s.title, xp:Number(s.xp)||50, coins:Number(s.coins)||12, done:false, doneDate:null, note:"" })),
          currentStep:0, complete:false, generatedAt:today(),
        };
        setG(prev => {
          if(!prev)return prev;
          const next={...prev,journeys:[...(prev.journeys||[]),journey]};
          persist(next); return next;
        });
      } catch(_) {}
    });
    // Generate milestones
    goals.forEach(async gt => { try { const ms=await genMilestones(gt,arc.name); addMilestones(gt,ms); } catch(_){} });
  }, [save]);
  const loadGame   = useCallback(s=>{ setG(normalise(s)); setLastUN(s.un); },[]);
  const setChosen  = useCallback((qs,extra={})=>up({...extra,daily:qs,chosen:true}),[up]);
  const resetQs    = useCallback(()=>up({daily:[],chosen:false,dDone:{}}),[up]);

  const addQs = useCallback(()=>setG(prev=>{
    if (!prev) return prev;
    const ex=new Set(prev.daily.map(q=>q.id));
    const arc=getArc(prev.arc);
    const nw=shuffle(DQ.filter(q=>!ex.has(q.id))).slice(0,12).map(q=>({...q,sd:1,isArc:q.stat===arc.stat}));
    const s={...prev,daily:[...prev.daily,...nw]};
    persist(s); setTimeout(()=>notify(`Added ${nw.length} quests!`),0); return s;
  }),[notify]);

  const refreshQs = useCallback(()=>setG(prev=>{
    if (!prev) return prev;
    const arc=getArc(prev.arc);
    const done=prev.daily.filter(q=>prev.dDone[q.id]);
    const active=prev.daily.filter(q=>!prev.dDone[q.id]);
    const ex=new Set(prev.daily.map(q=>q.id));
    const nw=shuffle(DQ.filter(q=>!ex.has(q.id))).slice(0,active.length).map(q=>({...q,sd:1,isArc:q.stat===arc.stat}));
    const s={...prev,daily:[...done,...nw]};
    persist(s); setTimeout(()=>notify("Quests refreshed!"),0); return s;
  }),[notify]);

  const refreshBQ = useCallback(()=>setG(prev=>{
    if (!prev) return prev;
    const doneCount=Object.keys(prev.bqDone||{}).length;
    const s={...prev,bossQs:getBossQuests(prev.arc||"iron",(prev.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length),bqDone:{},bqTotalDone:(prev.bqTotalDone||0)+doneCount};
    persist(s); setTimeout(()=>notify("Boss quests refreshed!"),0); return s;
  }),[notify]);

  const addSkillQ = useCallback(q=>setG(prev=>{
    if (!prev||!prev.chosen||prev.daily.find(x=>x.id===q.id)) return prev;
    const s={...prev,daily:[...prev.daily,{...q,sd:1,isArc:q.stat===getArc(prev.arc).stat}],skillUsed:[...(prev.skillUsed||[]),q.id]};
    persist(s); setTimeout(()=>notify(q.baseTitle+" added!"),0); return s;
  }),[notify]);

  const updateSkillJourney = useCallback(journey => setG(prev => {
    if (!prev) return prev;
    const existing = (prev.skillJourneys||[]).findIndex(j=>j.id===journey.id);
    const updated  = existing >= 0
      ? prev.skillJourneys.map(j=>j.id===journey.id?journey:j)
      : [...(prev.skillJourneys||[]), journey];

    // If journey just completed, apply mastery XP bonus for that stat
    let xpBonus = 0;
    const wasComplete  = existing >= 0 && prev.skillJourneys[existing]?.complete;
    const nowComplete  = journey.complete;
    if (nowComplete && !wasComplete) {
      const stat = journey.stat||"INT";
      const completedCount = updated.filter(j=>j.complete && (j.stat||"INT")===stat).length;
      const m = getMastery(completedCount);
      const baseJourneyXP = (journey.steps||[]).reduce((s,st)=>s+(st.xp||60),0);
      xpBonus = m ? Math.round(baseJourneyXP * (m.mult - 1)) : 0; // bonus XP on top
    }

    const [nx,nl] = xpBonus > 0 ? applyXP(prev.xp, prev.lv, xpBonus) : [prev.xp, prev.lv];
    const s = {
      ...prev,
      skillJourneys: updated,
      ...(xpBonus > 0 ? { xp:nx, lv:nl, totalXP:(prev.totalXP||0)+xpBonus } : {}),
    };
    persist(s);
    return s;
  }), []);

  const addCustomQ = useCallback(q=>setG(prev=>{
    if (!prev) return prev;
    const s=award({...prev,daily:[...prev.daily,{...q,sd:1,isArc:q.stat===getArc(prev.arc).stat}],customQuestCount:(prev.customQuestCount||0)+1});
    persist(s); setTimeout(()=>notify("Custom quest added! ✏️"),0); return s;
  }),[notify,award]);

  const completeQ = useCallback((qid,isBoss,note="")=>setG(prev=>{
    if (!prev) return prev;
    const list    = isBoss?prev.bossQs:prev.daily;
    const doneMap = isBoss?prev.bqDone:prev.dDone;
    if (doneMap[qid]) return prev;
    const q = list.find(x=>x.id===qid);
    if (!q) { console.warn("Quest not found:", qid, "isBoss:", isBoss); return prev; }

    // Boss quests: flat damage, no difficulty selection
    const xpBase   = isBoss ? (q.xp||50) : (() => { const di=q.sd??0; const d=q.difficulties[di]||q.difficulties[0]; return d.xp; })();
    const coinsVal = isBoss ? (q.coins||14) : (() => { const di=q.sd??0; const d=q.difficulties[di]||q.difficulties[0]; return d.coins; })();
    const xpGain   = Math.round(xpBase*(prev.xpMult?2:1));
    const [nx,nl,lv] = applyXP(prev.xp, prev.lv, xpGain);
    const stats  = {...prev.stats}; stats[q.stat]=Math.min(100,(stats[q.stat]||0)+Math.ceil(xpBase/20));
    const sp     = {...prev.skillProg}; sp[q.stat]=(sp[q.stat]||0)+1;
    const dm     = {...doneMap,[qid]:true};
    const tl     = {...prev.tallies}; tl[qid]=(tl[qid]||0)+1;
    const nt     = {...prev.notes}; if(note.trim()) nt[qid+"_"+Date.now()]={qid,note,date:today(),title:q.baseTitle};

    // ── Fury logic ───────────────────────────────────────────────────
    // Tracks total boss quests completed today (resets at midnight via normalise)
    const bossQsToday = isBoss ? (prev.bossQuestsToday||0)+1 : (prev.bossQuestsToday||0);
    const now_ts      = Date.now();
    const furyActive  = isBoss && (prev.bossRageUntil||0) > now_ts;
    // Every 3rd boss quest triggers/resets Fury for 24h
    const newFuryUntil = isBoss && (bossQsToday % 3 === 0)
      ? now_ts + 24*60*60*1000
      : (prev.bossRageUntil||0);
    const effectiveFury = furyActive || (isBoss && bossQsToday % 3 === 0);
    const flatDmg   = q.dmg || 10;
    const actualDmg = isBoss ? (effectiveFury ? flatDmg*2 : flatDmg) : 0;
    const bh        = isBoss ? Math.max(0, prev.bossHp - actualDmg) : prev.bossHp;
    const bdefeated = isBoss && bh<=0 && prev.bossHp>0;

    const entry = {...q, at:Date.now(), diff:"Standard", xpEarned:xpGain, note:note.trim()};
    let nextBossIdx=prev.bossIdx||0, nextBossHp=bh, nextBossUnlocksAt=prev.bossUnlocksAt||null;
    let nextBossDefeated=prev.bossDefeated, newBossLore=prev.bossLore||[];
    if (bdefeated) {
      nextBossIdx       = ((prev.bossIdx||0)+1)%5;
      nextBossHp        = getBoss(prev.arc,nextBossIdx).maxHp;
      const midnight    = new Date(); midnight.setHours(24,0,0,0);
      nextBossUnlocksAt = midnight.getTime();
      const db          = getBoss(prev.arc,prev.bossIdx||0);
      const drop        = db.drop;
      nextBossDefeated  = {
        boss:db, arc:getArc(prev.arc),
        daysFought:Math.max(1,Math.round((Date.now()-new Date(prev.bossStartDate||today()).getTime())/(86400000))),
        questsLanded:(prev.bqTotalDone||0)+Object.keys(prev.bqDone||{}).length,
        drop,
      };
      if (!newBossLore.find(l=>l.name===db.name))
        newBossLore = [...newBossLore,{name:db.name,emoji:db.emoji,lore:db.lore,taunt:getBossTaunt(db,0),defeated:today()}];
    }

    const base = {
      ...prev, xp:nx, totalXP:prev.totalXP+xpGain, lv:nl, coins:prev.coins+coinsVal,
      stats, skillProg:sp, momentum:Math.min(100,prev.momentum+5),
      bossHp:nextBossHp, bossIdx:nextBossIdx, bossUnlocksAt:nextBossUnlocksAt,
      bossStartDate: bdefeated ? today() : (prev.bossStartDate||today()),
      bossQuestsToday: bossQsToday,
      bossRageUntil: newFuryUntil,
      lastFightDate: isBoss ? today() : prev.lastFightDate,
      qDone:prev.qDone+1, xpMult:lv?false:prev.xpMult,
      ...(isBoss?{bqDone:dm}:{dDone:dm}),
      history:[...(prev.history||[]).slice(-199),entry], tallies:tl, notes:nt,
      bossDefeated:nextBossDefeated, bossLore:newBossLore,
      bossWins:bdefeated?(prev.bossWins||0)+1:(prev.bossWins||0),
    };

    // Add boss drop to inventory on defeat
    if (bdefeated && nextBossDefeated.drop) {
      const drop = nextBossDefeated.drop;
      const dropItem = { id:`drop_${Date.now()}`, name:drop.name, icon:drop.icon,
        type:"gear", stat:drop.stat, bonus:drop.bonus, equipped:false,
        slot:"relic", desc:`Dropped by ${nextBossDefeated.boss.name}` };
      base.inventory = [...(prev.inventory||[]), dropItem];
    }

    const s = award(base);
    persist(s);
    const notifyMsg = bdefeated ? "BOSS DEFEATED! 🏆"
      : newFuryUntil > (prev.bossRageUntil||0) ? "⚡ FURY ACTIVATED — 24h of double damage!"
      : lv ? "LEVEL UP! Lv."+nl
      : "+"+xpGain+"XP · +"+coinsVal+"🪙";
    setTimeout(()=>notify(notifyMsg), 0);
    return s;
  }),[notify,award]);

  const clearBD  = useCallback(()=>up({bossDefeated:null}),[up]);


  const saveCheckin  = useCallback(e  => up({checkin:{energy:e,date:today()}}),[up]);
  const saveDR       = useCallback(rev=> setG(prev=>{ if(!prev)return prev; const s=award({...prev,dailyReviews:{...prev.dailyReviews,[today()]:rev}}); persist(s); return s; }),[award]);

  const completeGoal = useCallback(goal=>setG(prev=>{
    if (!prev) return prev;
    const [nx,nl]=applyXP(prev.xp,prev.lv,GOAL_XP);
    const stats={...prev.stats}; stats[goal.stat]=Math.min(100,(stats[goal.stat]||0)+10);
    const goals={...prev.goals}; if(goals[goal.stat]) goals[goal.stat]=goals[goal.stat].filter(t=>t!==goal.text);
    const s=award({...prev,xp:nx,totalXP:prev.totalXP+GOAL_XP,lv:nl,coins:prev.coins+GOAL_COINS,stats,goals,
      mainGoals:(prev.mainGoals||[]).filter(t=>t!==goal.text),goalsCompleted:(prev.goalsCompleted||0)+1});
    persist(s); setTimeout(()=>notify("GOAL COMPLETE! +"+GOAL_XP+"XP 🏆"),0); return s;
  }),[notify,award]);

  const doneMilestone = useCallback((gt,idx)=>setG(prev=>{
    if (!prev) return prev;
    const ms=[...(prev.milestones?.[gt]||[])]; if(!ms[idx]||ms[idx].done) return prev;
    ms[idx]={...ms[idx],done:true};
    const [nx,nl]=applyXP(prev.xp,prev.lv,MILESTONE_XP);
    const s=award({...prev,xp:nx,totalXP:prev.totalXP+MILESTONE_XP,lv:nl,coins:prev.coins+MILESTONE_COINS,
      milestones:{...prev.milestones,[gt]:ms},milestoneDoneCount:(prev.milestoneDoneCount||0)+1});
    persist(s); setTimeout(()=>notify("Milestone done! +"+MILESTONE_XP+"XP"),0); return s;
  }),[notify,award]);

  const addMilestone  = useCallback((gt,text)=>up({milestones:{...(g?.milestones||{}),[gt]:[...(g?.milestones?.[gt]||[]),{text,done:false}]}}),[up,g]);
  const addMilestones = useCallback((gt,arr)=>setG(prev=>{
    if (!prev) return prev;
    const existing=prev.milestones?.[gt]||[];
    const s={...prev,milestones:{...prev.milestones,[gt]:[...existing,...arr]}};
    persist(s); return s;
  }),[]);
  const logGP = useCallback((gt,val)=>setG(prev=>{
    if (!prev) return prev;
    const p=prev.gProgress?.[gt]||{logged:[]};
    const s={...prev,gProgress:{...prev.gProgress,[gt]:{...p,logged:[...p.logged,{val,date:today()}]}}};
    persist(s); return s;
  }),[]);

  const setGoals       = useCallback((stat,gs)=>{
    const allGoals = {...(g?.goals||{}),[stat]:gs};
    const main = Object.values(allGoals).flat();
    up({goals:allGoals, mainGoals:main});
  },[up,g]);
  const setGoalDeadline= useCallback((gt,deadline)=>setG(prev=>{ if(!prev)return prev; const s={...prev,goalDeadlines:{...prev.goalDeadlines,[gt]:deadline}}; persist(s); return s; }),[]);
  const delQ           = useCallback(qid=>setG(prev=>{ if(!prev||prev.dDone[qid])return prev; const s={...prev,daily:prev.daily.filter(q=>q.id!==qid)}; persist(s); return s; }),[]);
  const setQD          = useCallback((qid,di)=>setG(prev=>{ if(!prev)return prev; const s={...prev,daily:prev.daily.map(q=>q.id===qid?{...q,sd:di}:q)}; persist(s); return s; }),[]);
  const setBQD         = useCallback((qid,di)=>setG(prev=>{ if(!prev)return prev; const s={...prev,bossQs:prev.bossQs.map(q=>q.id===qid?{...q,sd:di}:q)}; persist(s); return s; }),[]);
  const markLoreRead   = useCallback(()=>up({loreRead:(g?.loreRead||0)+1}),[up,g]);

  const buyItem  = useCallback(item=>setG(prev=>{
    if (!prev||prev.coins<item.cost) return prev;
    const s=award({...prev,coins:prev.coins-item.cost,bag:[...prev.bag,{...item,uid:Date.now()}]});
    persist(s); setTimeout(()=>notify("Bought "+item.name+"!"),0); return s;
  }),[notify,award]);
  const claimFree= useCallback(item=>setG(prev=>{ if(!prev)return prev; const s={...prev,bag:[...prev.bag,{...item,uid:Date.now()}],lastFree:today()}; persist(s); setTimeout(()=>notify("Claimed free "+item.name+"!"),0); return s; }),[notify]);
  const equipItem= useCallback(item=>setG(prev=>{
    if (!prev) return prev;
    const slot=item.type, old=prev.equipped[slot];
    const nb=prev.bag.filter(b=>b.uid!==item.uid); if(old)nb.push(old);
    const s={...prev,bag:nb,equipped:{...prev.equipped,[slot]:item}};
    persist(s); setTimeout(()=>notify("Equipped "+item.name+"!"),0); return s;
  }),[notify]);
  const useItem = useCallback(item=>setG(prev=>{
    if (!prev) return prev;
    const p={bag:prev.bag.filter(b=>b.uid!==item.uid)};
    if (item.id==="xp2x")    p.xpMult=true;
    if (item.id==="mom100")  p.momentum=100;
    if (item.id==="bossfrz") p.bossFrozen=(prev.bossFrozen||0)+2;
    if (item.id==="streaksh") setTimeout(()=>notify("🛡️ Streak Shield ready — your next missed day will not break your streak!"),0);
    const s={...prev,...p}; persist(s);
    if (item.id!=="streaksh") setTimeout(()=>notify("Used "+item.name+"!"),0);
    return s;
  }),[notify]);
  const resetGame      = useCallback(async()=>{ if(g){await deleteUN(g.un);await clearLastUN();} setG(null); },[g]);
  const switchAcc      = useCallback(async()=>{ await clearLastUN(); setG(null); },[]);

  return { g,loaded,setG,startGame,loadGame,setChosen,resetQs,addQs,refreshQs,refreshBQ,addSkillQ,updateSkillJourney,addCustomQ,
    completeQ,completeJourneyStep,addJourney,clearBD,saveCheckin,saveDR,completeGoal,doneMilestone,
    addMilestone,addMilestones,logGP,setGoals,setGoalDeadline,delQ,setQD,setBQD,markLoreRead,
    buyItem,claimFree,equipItem,useItem,resetGame,switchAcc,
    notify,toast,achPopup,setAchPopup };
}

// ─── LIFERP COACH ─────────────────────────────────────────────────
function Coach({ g, nav, seenScreens, markSeen }) {
  const [msgs,setMsgs]   = useState([{role:"assistant",text:"I'm your LifeRPG Coach. Ask me anything — what goals to set, skills to learn, books to read, or how to stay on track when it's hard."}]);
  const [input,setInput] = useState("");
  const [loading,setLoad]= useState(false);
  const endRef           = useRef(null);
  const arc              = getArc(g.arc);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [msgs]);

  const context = `Name: ${g.char.name}, Arc: ${arc.name}, Level: ${g.lv}, Streak: ${g.streak||0} days, Stats: ${SKEYS.map(k=>`${k}:${g.stats?.[k]||30}`).join("/")}, Goals: ${(g.mainGoals||[]).join("; ")||"none set"}, Quests done: ${g.qDone||0}`;

  async function send() {
    const text = input.trim(); if (!text || loading) return;
    setInput("");
    setMsgs(m => [...m, {role:"user",text}]);
    setLoad(true);
    try {
      const reply = await genCoachReply(text, context);
      setMsgs(m => [...m, {role:"assistant",text:reply}]);
    } catch(e) {
      setMsgs(m => [...m, {role:"assistant",text:"Something went wrong. Try again."}]);
    } finally { setLoad(false); }
  }

  const suggestions = [
    "What goals should I set for my arc?",
    "What skill should I learn next?",
    "Recommend 3 books for my arc",
    "I'm struggling to stay consistent",
    "What should I focus on this week?",
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:T.void }}>
      <Hdr title="LifeRPG Coach" page="coach" seenScreens={seenScreens} markSeen={markSeen} onBack={()=>nav("home")}
        right={<div style={{ fontSize:9, color:arc.color, fontWeight:700 }}>{arc.icon} {arc.name}</div>}/>

      {/* Messages */}
      <div style={{ flex:1, overflowY:"auto", padding:"12px 16px", scrollbarWidth:"none" }}>
        {msgs.length === 1 && (
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:9, color:T.textMuted, fontWeight:700, marginBottom:8 }}>QUICK QUESTIONS</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {suggestions.map((s,i) => (
                <div key={i} onClick={()=>{ setInput(s); }}
                  style={{ background:arc.color+"18", border:"1px solid "+arc.color+"33", borderRadius:20,
                    padding:"5px 10px", fontSize:10, color:arc.color, cursor:"pointer" }}>{s}</div>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m,i) => (
          <div key={i} style={{ marginBottom:12, display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
            {m.role==="assistant" && (
              <div style={{ width:32, height:32, borderRadius:"50%", background:arc.color+"22", border:"1px solid "+arc.color+"44",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0, marginRight:8, alignSelf:"flex-end" }}>🧙</div>
            )}
            <div style={{ maxWidth:"78%", background:m.role==="user"?arc.color:T.card,
              border:"1px solid "+(m.role==="user"?arc.color+"66":T.border),
              borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",
              padding:"10px 12px" }}>
              <div style={{ fontSize:12, color:m.role==="user"?T.void:T.textPrimary, lineHeight:1.6 }}>{m.text}</div>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", alignItems:"flex-end", gap:8, marginBottom:12 }}>
            <div style={{ width:32, height:32, borderRadius:"50%", background:arc.color+"22", border:"1px solid "+arc.color+"44",
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🧙</div>
            <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:"14px 14px 14px 4px", padding:"10px 14px" }}>
              <div style={{ display:"flex", gap:4 }}>
                {[0,1,2].map(j => <div key={j} style={{ width:6, height:6, borderRadius:"50%", background:arc.color, opacity:0.6, animation:`pulse 1.2s ${j*0.3}s infinite` }}/>)}
              </div>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{ background:T.panel, borderTop:"1px solid "+T.border, padding:"10px 16px 16px", flexShrink:0 }}>

function WeeklySummaryTab({ g, summary, setSummary, genSum, setGenSum }) {
  const arc       = getArc(g.arc);
  const weekStart = Date.now() - 7*86400000;
  const weekQs    = (g.history||[]).filter(q => q.at > weekStart);
  const statCounts= {};
  weekQs.forEach(q => { statCounts[q.stat]=(statCounts[q.stat]||0)+1; });
  const topStats  = Object.entries(statCounts).sort((a,b)=>b[1]-a[1]);
  const xpThisWeek= weekQs.reduce((s,q)=>s+(q.xpEarned||0),0);
  const weekAchs  = (g.achievements||[]).filter(id => {
    const a = ACHIEVEMENTS.find(x=>x.id===id);
    return a && (g.achUnlockedAt?.[id]||0) > weekStart;
  });

  async function generate() {
    setGenSum(true);
    try {
      const statDeltas = {};
      SKEYS.forEach(k => { statDeltas[k] = statCounts[k]||0; });
      const result = await genWeeklySummary(g.char.name, arc.name, weekQs, weekAchs, statDeltas, g.streak||0);
      if (!result?.summary) throw new Error("Invalid response");
      setSummary(result);
    } catch(e) { setSummary({error: e.message||"Failed — try again"}); }
    finally { setGenSum(false); }
  }

  return (
    <div>
      {/* Stats row */}
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        {[
          ["Quests", weekQs.length, T.gold],
          ["XP", xpThisWeek.toLocaleString(), T.purple],
          ["Streak", (g.streak||0)+"d", T.orange],

          <div key={label} style={{ flex:1, background:T.card, borderRadius:10, padding:"10px 8px", textAlign:"center" }}>
            <div style={{ fontSize:18, fontWeight:900, color }}>{val}</div>
            <div style={{ fontSize:9, color:T.textMuted }}>{label}</div>
          </div>
        ))}
      </div>

      {/* Stat breakdown */}
      {topStats.length > 0 && (
        <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
          <div style={{ fontSize:9, color:T.textMuted, fontWeight:700, marginBottom:8 }}>STATS TRAINED THIS WEEK</div>
          {topStats.map(([k,n]) => {
            const m = SM[k]||SM.STR;
            return (
              <div key={k} style={{ marginBottom:6 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                  <span style={{ fontSize:11, color:m.color }}>{m.icon} {m.label}</span>
                  <span style={{ fontSize:10, color:T.textSecondary }}>{n} quest{n!==1?"s":""}</span>
                </div>
                <Bar val={n} max={Math.max(...Object.values(statCounts))} color={m.color} h={4}/>
              </div>
            );
          })}
        </div>
      )}

      {/* Achievements this week */}
      {weekAchs.length > 0 && (
        <div style={{ background:T.card, border:"1px solid "+T.gold+"33", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
          <div style={{ fontSize:9, color:T.gold, fontWeight:700, marginBottom:8 }}>🏅 ACHIEVEMENTS UNLOCKED</div>
          {weekAchs.map(id => { const a=ACHIEVEMENTS.find(x=>x.id===id); return a?(
            <div key={id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <span style={{ fontSize:16 }}>{a.icon}</span>
              <div style={{ flex:1 }}><div style={{ fontSize:11, fontWeight:700 }}>{a.name}</div><div style={{ fontSize:9, color:T.textMuted }}>{a.desc}</div></div>
            </div>

        </div>

      {/* AI Summary */}
      <div style={{ background:T.card, border:"1px solid "+arc.color+"33", borderRadius:12, padding:14, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:summary?8:0 }}>

            {summary.highlights?.length>0 && (
              <div style={{ marginBottom:10 }}>

                  <div key={i} style={{ fontSize:10, color:T.textSecondary, marginBottom:4, display:"flex", gap:7 }}>
                    <span style={{ color:T.mint }}>✓</span>{h}

              <div style={{ background:T.gold+"11", border:"1px solid "+T.gold+"33", borderRadius:8, padding:"8px 10px", marginBottom:8 }}>

        <div style={{ textAlign:"center", padding:30, color:T.textMuted, fontSize:11 }}>No quests completed this week yet. Get going.</div>
      )}

  );
}

// Skill quiz sub-component
function SkillQuizFlow({ skill, arcColor, onComplete, onCancel }) {
  const [phase, setPhase]   = useState("gen");
  const [questions, setQs]  = useState([]);
  const [qi, setQi]         = useState(0);
  const [answers, setAns]   = useState({});
  const [err, setErr]       = useState("");
  const attemptRef          = useRef(0);

  function run() {
    attemptRef.current++;
    setPhase("gen"); setErr("");
    (async()=>{
      try { const qs = await genSkillQuiz(skill); setQs(qs); setPhase("quiz"); }
      catch(e) {
        if (attemptRef.current < 3) { await new Promise(r=>setTimeout(r,1200)); run(); }
        else { setErr(e.message||"Failed"); setPhase("error"); }
      }
    })();
  }
  useEffect(()=>{ run(); },[]);

  function answer(optIdx) {
    const next = {...answers,[qi]:questions[qi].opts[optIdx]};
    setAns(next);
    if (qi < questions.length-1) { setTimeout(()=>setQi(x=>x+1),240); }
    else { setPhase("done"); setTimeout(()=>onComplete(Object.values(next)),600); }
  }

  if (phase==="gen") return (
    <div style={{ padding:"24px 16px", textAlign:"center" }}>
      <div style={{ fontSize:28, marginBottom:10 }}>🎯</div>
      <div style={{ fontSize:13, fontWeight:700, marginBottom:6 }}>Assessing your level…</div>
      <div style={{ fontSize:10, color:T.textSecondary }}>4 quick questions about your experience</div>
    </div>
  );
  if (phase==="error") return (
    <div style={{ padding:24, textAlign:"center" }}>
      <div style={{ fontSize:11, color:T.red, marginBottom:12 }}>{err}</div>
      <div style={{ display:"flex", gap:8, justifyContent:"center" }}>

      </div>
    </div>
  );
  if (phase==="done") return (
    <div style={{ padding:24, textAlign:"center" }}>
      <div style={{ fontSize:36, marginBottom:10 }}>✓</div>
      <div style={{ fontSize:13, fontWeight:700 }}>Building your skill journey…</div>
    </div>
  );

  const q = questions[qi];
  return (
    <div style={{ padding:"16px 0" }}>
      <div style={{ display:"flex", gap:2, marginBottom:14 }}>
        {questions.map((_,i)=><div key={i} style={{ flex:1, height:3, borderRadius:99, background:i<qi?arcColor:i===qi?T.gold:T.border }}/>)}
      </div>
      <div style={{ fontSize:13, fontWeight:700, lineHeight:1.5, marginBottom:14 }}>{q.q}</div>

      })}
      <div style={{ fontSize:9, color:T.textMuted, textAlign:"center", marginTop:6 }}>Q{qi+1}/{questions.length}</div>
    </div>
  );
}

function SkillJourneyCard({ j, onUpdate }) {
  const [showLocked, setShowLocked] = useState(false);
  const [completing, setCompleting] = useState(false);
  const [note, setNote]             = useState("");
  const done    = j.steps.filter(s=>s.done);

  const locked  = j.steps.slice(j.currentStep+1);
  const pct     = Math.round((j.currentStep/j.steps.length)*100);

  function completeStep() {
    const updatedSteps = j.steps.map((s,i) =>
      i===j.currentStep ? {...s, done:true, doneDate:new Date().toString(), note:note.trim()} : s
    );
    const newIdx = j.currentStep+1;

    setCompleting(false); setNote("");

  return (
    <div style={{ background:T.card, border:"1px solid "+T.cyan+"33", borderRadius:12, padding:14, marginBottom:12 }}>

function SkillQuestsTab({ g, arc, updateSkillJourney }) {
  const [input, setInput] = useState("");
  const [phase, setPhase] = useState("search"); // search | quiz | building
  const [skill, setSkill] = useState("");
  const [genErr, setGenErr] = useState("");
  const skillRef = useRef(""); // ref so async callback always has current value
  const skillJourneys = (g.skillJourneys||[]);

  function startSkill() {
    const s = input.trim();
    if (!s) return;
    skillRef.current = s;
    setSkill(s); setPhase("quiz"); setGenErr("");
  }

  async function onQuizComplete(answers) {
    // Use ref value — safe even if component re-renders during the 600ms delay
    const currentSkill = skillRef.current;
    if (!currentSkill) return;
    setPhase("building"); setGenErr("");
    try {
      const steps = await genSkillJourney(currentSkill, arc.name, answers);
      if (!Array.isArray(steps) || steps.length === 0) throw new Error("No steps returned");
      const journey = {
        id:`skj_${Date.now()}`, skill:currentSkill, icon:"🎯", stat:"INT",
        steps: steps.map((s,i)=>({
          id:`skjs_${i}_${Date.now()}`,
          title:String(s.title||"Complete step "+(i+1)),
          xp:Number(s.xp)||60, coins:Number(s.coins)||15,
          done:false, doneDate:null, note:""
        })),
        currentStep:0, complete:false, createdAt:today(),
      };
      updateSkillJourney(journey);
      setPhase("search"); setInput(""); setSkill(""); skillRef.current="";
    } catch(e) {
      setGenErr("Generation failed — try again. "+e.message);
      setPhase("search");
    }
  }

  return (
    <div>
      {/* Generator always at top */}
      {phase==="search" && (
        <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:12, padding:14, marginBottom:14 }}>
          <div style={{ fontSize:12, fontWeight:700, marginBottom:4 }}>🎯 New Skill Journey</div>
          <div style={{ fontSize:10, color:T.textSecondary, marginBottom:10 }}>Enter a skill — we assess your level then build a personalised 5-step journey</div>
          <div style={{ display:"flex", gap:8 }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&startSkill()}
              placeholder="e.g. guitar, Python, public speaking…"
              style={{ flex:1, background:T.panel, border:"1px solid "+T.border, borderRadius:8, padding:"9px 12px", fontSize:12, color:T.textPrimary, outline:"none" }}/>
            <div onClick={startSkill} style={{ background:T.purple, borderRadius:8, padding:"9px 14px", fontSize:11, color:T.void, fontWeight:700, cursor:"pointer" }}>Start →</div>
          </div>
          {genErr && <div style={{ fontSize:10, color:T.red, marginTop:6 }}>{genErr}</div>}
        </div>
      )}

      {phase==="quiz" && (
        <div style={{ background:T.card, border:"1px solid "+arc.color+"33", borderRadius:12, padding:14, marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:arc.color }}>📋 {skill}</div>
            <div onClick={()=>setPhase("search")} style={{ fontSize:10, color:T.textSecondary, cursor:"pointer" }}>✕ Cancel</div>
          </div>
          <SkillQuizFlow skill={skill} arcColor={arc.color} onComplete={onQuizComplete} onCancel={()=>setPhase("search")}/>
        </div>
      )}

      {phase==="building" && (
        <div style={{ background:T.card, border:"1px solid "+arc.color+"33", borderRadius:12, padding:24, textAlign:"center", marginBottom:14 }}>
          <div style={{ fontSize:28, marginBottom:10 }}>⏳</div>
          <div style={{ fontSize:13, fontWeight:700, color:arc.color, marginBottom:4 }}>Building your {skill} journey…</div>
          <div style={{ fontSize:10, color:T.textSecondary }}>Creating 5 steps tailored to your level</div>
        </div>
      )}

      {/* Journeys below the generator */}
      {skillJourneys.length > 0 && (
        <div>
          <div style={{ fontSize:9, color:T.textSecondary, fontWeight:700, marginBottom:8, letterSpacing:"0.08em" }}>YOUR SKILL JOURNEYS</div>
          {skillJourneys.map(j => <SkillJourneyCard key={j.id} j={j} onUpdate={updateSkillJourney}/>)}
        </div>
      )}

      {skillJourneys.length===0 && phase==="search" && (
        <div style={{ textAlign:"center", padding:"20px 0", color:T.textSecondary, fontSize:10, lineHeight:1.7 }}>
          No skill journeys yet. Type any skill above to get started.
        </div>
      )}
    </div>
  );
}


// Proper component for journey cards in Quests tab (fixes hooks-in-map #300)
// Shared Hack button — fetches a tip on first press, shows inline
function HackButton({ fetchTip, color }) {
  const [state, setState] = useState("idle"); // idle | loading | shown
  const [tip, setTip]     = useState("");
  async function press() {
    if (state === "shown") { setState("idle"); return; }
    if (state === "loading") return;
    setState("loading");
    try {
      const t = await fetchTip();
      setTip(String(t).replace(/^["']|["']$/g,"").trim());
      setState("shown");
    } catch(_) { setState("idle"); }
  }
  return (
    <div>
      <div onClick={press} style={{ background:state==="shown"?color+"22":"transparent",
        border:"1px solid "+color+"66", borderRadius:6, padding:"4px 10px",
        fontSize:9, color:color, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap",
        opacity:state==="loading"?0.6:1 }}>
        {state==="loading"?"…":state==="shown"?"✕ Hack":"💡 Hack"}
      </div>
      {state==="shown" && tip && (
        <div style={{ marginTop:5, background:color+"11", border:"1px solid "+color+"33",
          borderRadius:6, padding:"6px 8px", fontSize:10, color:T.textPrimary, lineHeight:1.55 }}>
          {tip}
        </div>
      )}
    </div>
  );
}

// ─── UNEXPECTED TRUTH ─────────────────────────────────────────────
function computeInsights(g) {
  const h = g.history||[];
  if (h.length < 5) return [];
  const insights = [];
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const byDay = Array(7).fill(0);
  h.forEach(q => byDay[new Date(q.at).getDay()]++);
  const peakDay = byDay.indexOf(Math.max(...byDay));
  const peakCount = byDay[peakDay];
  const otherAvg = byDay.filter((_,i)=>i!==peakDay).reduce((a,b)=>a+b,0)/6;
  if (otherAvg > 0 && peakCount/otherAvg >= 2)
    insights.push({ value:days[peakDay], sentence:`You complete ${Math.round(peakCount/otherAvg)}× more quests on ${days[peakDay]}s than any other day of the week.` });
  const counts = {};
  h.forEach(q => { counts[q.baseTitle]=(counts[q.baseTitle]||0)+1; });
  const [topTitle, topN] = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]||[];
  if (topTitle && topN >= 5)
    insights.push({ value:`${topN}×`, sentence:`"${topTitle}" is your most reliable habit — completed ${topN} times and counting.` });
  const hardPct = Math.round((h.filter(q=>q.diff==="Hard").length/h.length)*100);
  if (hardPct >= 25)
    insights.push({ value:`${hardPct}%`, sentence:`${hardPct}% of your completed quests are at Hard difficulty. Most players never leave Medium.` });
  const notePct = Math.round((h.filter(q=>q.note&&q.note.length>5).length/h.length)*100);
  if (notePct >= 30)
    insights.push({ value:`${notePct}%`, sentence:`You reflect on ${notePct}% of completed quests. Players who write notes are significantly more likely to follow through.` });
  const morning = h.filter(q=>new Date(q.at).getHours()<12).length;
  const evening = h.filter(q=>new Date(q.at).getHours()>=18).length;
  if (morning > h.length*0.6)
    insights.push({ value:`${Math.round(morning/h.length*100)}%`, sentence:`${Math.round(morning/h.length*100)}% of your quests are completed before noon. You are a morning player — protect your mornings.` });
  else if (evening > h.length*0.6)
    insights.push({ value:`${Math.round(evening/h.length*100)}%`, sentence:`${Math.round(evening/h.length*100)}% of your quests happen after 6pm. Your best hours are at the end of the day.` });
  const vals = SKEYS.map(k=>g.stats[k]||30);
  const gap  = Math.max(...vals)-Math.min(...vals);
  if (gap >= 15) {
    const weak   = SM[SKEYS[vals.indexOf(Math.min(...vals))]];
    const strong = SM[SKEYS[vals.indexOf(Math.max(...vals))]];
    insights.push({ value:`${gap}pts`, sentence:`Your ${strong.label} is ${gap} points ahead of your ${weak.label}. Characters with one weak stat always fail at the crucial moment.` });
  }
  if ((g.totalXP||0)>=2000)
    insights.push({ value:`${(g.totalXP||0).toLocaleString()}XP`, sentence:`You have earned ${(g.totalXP||0).toLocaleString()} total XP — every point was a choice to show up when it would have been easier not to.` });
  if ((g.bossWins||0)>=1)
    insights.push({ value:`${g.bossWins} boss${g.bossWins!==1?"es":""}`, sentence:`You have defeated ${g.bossWins} boss${g.bossWins!==1?"es":""} — most people who download self-improvement apps quit before fighting their first.` });
  return insights;
}

function UnexpectedTruth({ g }) {
  const insights = useMemo(()=>computeInsights(g),[g.qDone,g.totalXP]);
  if (!insights.length) return null;
  const week    = Math.floor(Date.now()/(7*86400000));
  const insight = insights[week % insights.length];
  const arc     = getArc(g.arc);
  return (
    <div style={{ margin:"10px 14px 0", background:"#0a0a0a", border:"1px solid #1a1a1a", borderRadius:12,
      padding:"16px 18px", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:0, left:0, bottom:0, width:3, background:arc.color, borderRadius:"2px 0 0 2px" }}/>
      <div style={{ fontSize:9, color:"#444", letterSpacing:"0.2em", marginBottom:8 }}>THIS WEEK'S TRUTH</div>
      <div style={{ fontSize:32, fontWeight:900, color:"#fff", marginBottom:8, letterSpacing:"-0.02em" }}>{insight.value}</div>
      <div style={{ fontSize:12, color:"#888", lineHeight:1.65 }}>{insight.sentence}</div>
    </div>
  );
}

      setG(prev => { if(!prev)return prev; const n={...prev,profileSummary:result}; persist(n); return n; });
    } catch(e) { setSumErr(e.message||"Failed. Try again."); }
    finally { setSumLoad(false); }
  }

  return (
    <div style={{ background:T.card, border:"1px solid "+(locked?T.border:T.purple+"44"), borderRadius:12, padding:"12px 14px", marginBottom:12 }}>
      <div onClick={()=>!locked&&setSumOpen(x=>!x)} style={{ display:"flex", alignItems:"center", gap:10, cursor:locked?"default":"pointer" }}>
        <div style={{ fontSize:20 }}>🧠</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:12, fontWeight:700, color:locked?T.textMuted:T.purple }}>Profile Summary</div>
          <div style={{ fontSize:9, color:T.textMuted }}>{locked?`Unlocks after 3 journeys (${journeyCount}/3 created)`:hasSummary?"AI analysis of your habits and goals":"Tap to generate your AI profile"}</div>
        </div>
        {!locked && <span style={{ fontSize:14, color:T.textMuted }}>{sumOpen?"↑":"↓"}</span>}
      </div>
      {sumOpen && !locked && (
        <div style={{ marginTop:12 }}>
          {!hasSummary && !sumLoading && !sumErr && (
            <div onClick={generate} style={{ background:T.purple, borderRadius:9, padding:"10px 14px", textAlign:"center", color:T.void, fontWeight:700, fontSize:12, cursor:"pointer" }}>Generate Profile →</div>
          )}
          {sumLoading && <div style={{ fontSize:11, color:T.purple, textAlign:"center", padding:8 }}>⏳ Analysing your journey data…</div>}
          {sumErr && <div style={{ fontSize:10, color:T.red, marginBottom:8 }}>{sumErr}<span onClick={generate} style={{ color:T.purple, cursor:"pointer", marginLeft:6 }}>Retry</span></div>}
          {hasSummary && g.profileSummary && (
            <div>
              <div style={{ fontSize:11, color:T.textSecondary, lineHeight:1.75, marginBottom:12, padding:"8px 12px", background:T.panel, borderRadius:8 }}>{g.profileSummary.overview}</div>

                  {g.profileSummary.studyTopics.map((s,i)=><div key={i} style={{ fontSize:10, color:T.textSecondary, marginBottom:3, display:"flex", gap:6 }}><span style={{ color:T.blue }}>📖</span>{s}</div>)}
                </div>
