const GOAL_SUGGESTIONS = {
  STR: ["Run a 5k without stopping","Do 50 consecutive push-ups","Work out 4x per week for 8 weeks","Lose 5kg by [date]","Complete a 30-day yoga challenge"],
  INT: ["Read 12 books this year","Complete an online course in [skill]","Write 500 words every day for 30 days","Learn conversational [language] in 3 months","Build a side project from scratch"],
  CHA: ["Expand network by 20 meaningful connections","Give a talk or presentation to a group","Message 3 old contacts each week for a month","Attend 1 event per week for 6 weeks","Start a podcast or YouTube channel"],
  WLT: ["Save £3,000 by [date]","Pay off [debt] completely","Increase monthly income by £500","Build a 3-month emergency fund","Invest consistently for 6 months"],
  VIT: ["Sleep 7+ hours every night for 30 days","Drink 2 litres of water daily for 6 weeks","Meditate every morning for 60 days","Cut processed food for 30 days","Run a cold shower streak for 21 days"],
  DIS: ["Build a daily journaling habit for 30 days","Stay off social media before noon for 6 weeks","Plan the night before every day for a month","Complete every task on my list 5 days a week","Keep a streak of [habit] for 60 days"],
};
function RegenJourneySection({ g, detail, journeyFor, setG, setDetail }) {
  const j = journeyFor(detail.text);
  const hasActiveJourney = j && !j.complete;
  const m = j ? (SM[j.stat]||SM.STR) : (SM[detail.stat]||SM.STR);
  const [regenState, setRegenState] = useState("idle");
  const [regenErr, setRegenErr] = useState("");
  const canRegen = !!(g.quizAnswers||[]).length;

  if (hasActiveJourney) return (
    <div style={{ background:T.card, border:"1px solid "+m.color+"33", borderRadius:10, padding:"10px 12px", marginBottom:16 }}>
      <div style={{ fontSize:9, color:m.color, fontWeight:700, marginBottom:6 }}>JOURNEY PROGRESS</div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <span style={{ fontSize:10, color:T.textSecondary }}>Step {j.currentStep} of {j.steps.length}</span>
        <span style={{ fontSize:10, color:m.color }}>{Math.round((j.currentStep/j.steps.length)*100)}%</span>
      </div>
      <Bar val={j.currentStep} max={j.steps.length} color={m.color} h={5}/>
      {j.steps[j.currentStep] && (
        <div style={{ fontSize:11, color:T.textSecondary, marginTop:8 }}>
          Next: <span style={{ color:T.textPrimary, fontWeight:600 }}>{j.steps[j.currentStep].title}</span>
        </div>
      )}
    </div>
  );

  async function regenerate() {
    if (!canRegen || regenState === "loading") return;
    setRegenState("loading"); setRegenErr("");
    try {
      const arc2 = getArc(g.arc);
      const quizSummary = (g.quizAnswers||[]).map((a,i)=>`A${i+1}: ${a}`).join("\n");
      const dl = (g.goalDeadlines||{})[detail.text] || "";
      const raw = await genJourney(detail.text, arc2.name, quizSummary, [], dl);
      const journey = {
        id:`j_regen_${Date.now()}`, goalText:detail.text,
        stat:statOf(detail.text)||arc2.stat,
        icon:getJourneyIcon(statOf(detail.text)||arc2.stat),
        steps:raw.map((s,i)=>({id:`jrg_${i}_${Date.now()}`,title:s.title,xp:Number(s.xp)||50,coins:Number(s.coins)||12,done:false,doneDate:null,note:""})),
        currentStep:0, complete:false, generatedAt:today(),
      };
      setG(prev => {
        if (!prev) return prev;
        const filtered = (prev.journeys||[]).filter(jj => jj.goalText !== detail.text);
        const n = {...prev, journeys:[...filtered, journey]};
        persist(n); return n;
      });
      setRegenState("done");
      setTimeout(() => setDetail(null), 800);
    } catch(e) {
      setRegenErr(e.message||"Generation failed");
      setRegenState("error");
    }
  }

  return (
    <div style={{ marginBottom:16 }}>
      {j?.complete && (
        <div style={{ background:T.mint+"11", border:"1px solid "+T.mint+"33", borderRadius:8, padding:"8px 12px", marginBottom:8, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:14 }}>🏆</span>
          <div style={{ fontSize:10, color:T.mint }}>Journey complete! Generate a new one to keep going.</div>
        </div>
      )}
      {!j && (
        <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:8, padding:"8px 12px", marginBottom:8 }}>
          <div style={{ fontSize:10, color:T.textSecondary }}>No active journey for this goal yet.</div>
        </div>
      )}
      {!canRegen && (
        <div style={{ fontSize:10, color:T.textSecondary, marginBottom:8, textAlign:"center" }}>
          Complete the goal quiz first to generate a journey.
        </div>
      )}
      {canRegen && (
        <div onClick={regenerate}
          style={{ background:regenState==="loading"?T.panel:regenState==="done"?T.mint:T.purple,
            borderRadius:10, padding:"11px 16px", textAlign:"center", color:T.void,
            fontWeight:700, cursor:regenState==="loading"?"default":"pointer",
            opacity:regenState==="loading"?0.7:1 }}>
          {regenState==="loading" ? "⏳ Generating journey…"
            : regenState==="done"  ? "✓ Journey created!"
            : regenState==="error" ? "⚠️ Failed — try again"
            : "🔄 Generate New Journey"}
        </div>
      )}
      {regenErr && <div style={{ fontSize:10, color:T.red, textAlign:"center", marginTop:6 }}>{regenErr} <span onClick={regenerate} style={{ color:T.purple, cursor:"pointer" }}>Retry</span></div>}
    </div>
  );
}

function Goals({ g, setGoals, completeGoal, setGoalDeadline, nav, onFirstGoalSaved, seenScreens, markSeen, setG }) {
  const [editStat, setES]   = useState(null);
  const [input, setIn]      = useState("");
  const [deadline, setDL]   = useState("");
  const [detail, setDetail] = useState(null);
  const [cel, setCel]       = useState(false);
  const arc   = getArc(g.arc);
  const goals = g.goals||{};

  // Flat goal list
  const all = [];
  SKEYS.forEach(s => (goals[s]||[]).forEach((text,i) => all.push({stat:s,text,i})));
  const known = new Set(all.map(x=>x.text));
  (g.mainGoals||[]).forEach(text => { if (!known.has(text)) { const s=statOf(text)||arc.stat; all.push({stat:s,text,i:-1,isMain:true}); }});

  const urgencyColor = d => {
    if (!d) return null;
    const days = Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
    return days < 0 ? T.red : days <= 7 ? T.orange : days <= 30 ? T.gold : T.mint;
  };
  const daysLeft = d => {
    if (!d) return null;
    const days = Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
    return days < 0 ? "overdue!" : days===0 ? "today!" : days+"d left";
  };

  // Find the journey for a goal
  const journeyFor = text => (g.journeys||[]).find(j=>j.goalText===text);

  return (
    <div style={{ paddingBottom:80 }}>
      {cel && (
        <div onClick={()=>setCel(false)} style={{ position:"fixed", inset:0, zIndex:900, background:"rgba(0,0,0,0.85)",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ fontSize:80, marginBottom:12 }}>🏆</div>
          <div style={{ fontSize:24, fontWeight:900, color:T.gold, marginBottom:8 }}>GOAL COMPLETE!</div>
          <div style={{ fontSize:16, color:T.mint }}>+{GOAL_XP} XP · +{GOAL_COINS} 🪙</div>
          <div style={{ fontSize:10, color:T.textMuted, marginTop:16 }}>Tap to continue</div>
        </div>
      )}

      {detail && (
        <Modal onClose={()=>setDetail(null)}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
            <span style={{ fontSize:20 }}>{SM[detail.stat]?.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:700 }}>{detail.text}</div>
              <div style={{ fontSize:10, color:SM[detail.stat]?.color }}>{SM[detail.stat]?.label}</div>
            </div>
          </div>

          {/* Deadline */}
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:10, color:T.textMuted, marginBottom:6, fontWeight:700 }}>TARGET DATE</div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <input type="date" defaultValue={g.goalDeadlines?.[detail.text]||""}
                onChange={e=>{ setGoalDeadline(detail.text, e.target.value); }}
                style={{ flex:1, background:T.card, border:"1px solid "+T.border, borderRadius:8, padding:"8px 10px", fontSize:12, color:T.textPrimary, outline:"none" }}/>
            </div>
            {g.goalDeadlines?.[detail.text] && (
              <div style={{ fontSize:10, marginTop:4, color:urgencyColor(g.goalDeadlines[detail.text]) }}>{daysLeft(g.goalDeadlines[detail.text])}</div>
            )}
          </div>

          {/* Journey progress or regenerate */}
          <RegenJourneySection g={g} detail={detail} journeyFor={journeyFor} setG={setG} setDetail={setDetail}/>

          <div onClick={()=>{ completeGoal(detail); setDetail(null); setCel(true); setTimeout(()=>setCel(false),3000); }}
            style={{ background:T.gold, borderRadius:10, padding:"11px 16px", textAlign:"center", color:T.void, fontWeight:700, cursor:"pointer", marginBottom:8 }}>
            🏆 Mark Goal Complete (+{GOAL_XP}XP)
          </div>
          <Btn onClick={()=>setDetail(null)} color={T.border}>Close</Btn>
        </Modal>
      )}

      <Hdr title="Goals" page="goals" seenScreens={seenScreens} markSeen={markSeen} onBack={()=>nav("home")}/>

      {/* Prompt to add first goal */}
      {all.length === 0 && (
        <div style={{ margin:"16px 16px 0", background:`linear-gradient(135deg,${arc.color}18,${T.panel})`, border:`1px solid ${arc.color}44`, borderRadius:14, padding:20 }}>
          <div style={{ fontSize:9, color:arc.color, fontWeight:700, letterSpacing:"0.1em", marginBottom:8 }}>START HERE</div>
          <div style={{ fontSize:16, fontWeight:900, marginBottom:8 }}>What are you actually fighting for?</div>
          <div style={{ fontSize:12, color:T.textSecondary, lineHeight:1.7, marginBottom:12 }}>
            Your goals become personalised journeys. The more specific you are, the better your steps will be.
          </div>
          <div style={{ fontSize:10, color:arc.color, fontStyle:"italic" }}>
            "Save £3,000 by December" builds a better journey than "save money."
          </div>
        </div>
      )}

      <div style={{ padding:"12px 16px" }}>
        {all.length>0 && (
          <div style={{ background:T.card, border:"1px solid "+T.gold+"33", borderRadius:12, padding:14, marginBottom:16 }}>
            <div style={{ fontSize:10, fontWeight:700, color:T.gold, marginBottom:10 }}>🎯 YOUR GOALS</div>
            {all.map((gl,idx) => {
              const m  = SM[gl.stat]||SM.STR;
              const dl = g.goalDeadlines?.[gl.text];
              const j  = journeyFor(gl.text);
              return (
                <div key={idx} onClick={()=>setDetail(gl)}
                  style={{ background:T.panel, borderRadius:9, padding:"10px 12px", marginBottom:8, cursor:"pointer" }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
                    <span style={{ fontSize:14, marginTop:1 }}>{m.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12, fontWeight:600, lineHeight:1.4 }}>{gl.text}</div>
                      <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap", alignItems:"center" }}>
                        <Tag color={m.color}>{m.label}</Tag>
                        {dl && <Tag color={urgencyColor(dl)||T.mint}>{daysLeft(dl)}</Tag>}
                        {j && <Tag color={j.complete?T.mint:m.color}>{j.complete?"Done ✓":"Journey "+Math.round((j.currentStep/j.steps.length)*100)+"%"}</Tag>}
                      </div>
                    </div>
                    <span style={{ fontSize:14, color:T.textMuted }}>›</span>
                  </div>
                  {j && !j.complete && <div style={{ marginTop:8 }}><Bar val={j.currentStep} max={j.steps.length} color={m.color} h={3}/></div>}
                </div>
              );
            })}
          </div>
        )}

        <div style={{ background:T.purple+"11", border:"1px solid "+T.purple+"33", borderRadius:10, padding:12, marginBottom:14, fontSize:10, color:T.textSecondary }}>
          Each goal generates a personalised 10-step journey. Complete the goal for <span style={{ color:T.gold, fontWeight:700 }}>+{GOAL_XP}XP</span> + <span style={{ color:T.mint, fontWeight:700 }}>+{GOAL_COINS}🪙</span>.
        </div>

        {SKEYS.map(k => (
          <StatGoalRow key={k} k={k} goals={goals} GOAL_SUGGESTIONS={GOAL_SUGGESTIONS}
            onAdd={()=>{ setES(k); setIn(""); setDL(""); }}
            onSuggest={(s)=>{ setES(k); setIn(s); setDL(""); }}/>
        ))}
      </div>

      {editStat && (
        <Modal onClose={()=>setES(null)}>
          <div style={{ fontSize:14, fontWeight:700, marginBottom:4 }}>{SM[editStat]?.icon} {SM[editStat]?.label} Goal</div>
          <div style={{ fontSize:10, color:T.textMuted, marginBottom:12, lineHeight:1.5 }}>Be specific — the AI builds a personalised journey from exactly what you write.</div>
          <input value={input} onChange={e=>setIn(e.target.value)} placeholder="e.g. Run a 5k in under 30 minutes" autoFocus
            style={{ width:"100%", background:T.card, border:"1px solid "+T.border, borderRadius:8, padding:"10px 12px", fontSize:12, color:T.textPrimary, outline:"none", marginBottom:10, boxSizing:"border-box" }}/>
          <div style={{ fontSize:10, color:T.textMuted, marginBottom:6 }}>Target completion date <span style={{ color:T.textMuted, fontStyle:"italic" }}>(optional but recommended)</span></div>
          <input type="date" value={deadline} onChange={e=>setDL(e.target.value)}
            style={{ width:"100%", background:T.card, border:"1px solid "+T.border, borderRadius:8, padding:"10px 12px", fontSize:12, color:T.textPrimary, outline:"none", marginBottom:14, boxSizing:"border-box" }}/>
          <div style={{ display:"flex", gap:8 }}>
            <div onClick={()=>{
              if (!input.trim()) return;
              const s=statOf(input)||editStat, gt=input.trim();
              const newGoals = [...(goals[s]||[]), gt];
              setGoals(s, newGoals);
              if (deadline) setGoalDeadline(gt, deadline);
              setES(null);
              // Only trigger quiz on very first goal ever. After that, generate journey directly.
              if (onFirstGoalSaved) onFirstGoalSaved([gt], deadline);
            }} style={{ flex:2, background:input.trim()?T.gold:T.border, borderRadius:9, padding:11, textAlign:"center", color:input.trim()?T.void:T.textMuted, fontWeight:700, cursor:input.trim()?"pointer":"default" }}>Save Goal</div>
            <div onClick={()=>setES(null)} style={{ flex:1, background:T.border, borderRadius:9, padding:11, textAlign:"center", color:T.textSecondary, fontWeight:700, cursor:"pointer" }}>Cancel</div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Achievements({ g, nav, seenScreens, markSeen }) {
  const earned     = new Set(g.achievements||[]);

      <div style={{ padding:"12px 16px" }}>
        <div style={{ background:T.card, border:"1px solid "+T.gold+"33", borderRadius:12, padding:12, marginBottom:16, display:"flex", gap:10, alignItems:"center" }}>
          <div style={{ textAlign:"center" }}><div style={{ fontSize:24, fontWeight:900, color:T.gold }}>{earnedList.length}</div><div style={{ fontSize:9, color:T.textMuted }}>EARNED</div></div>

        {lockedList.length>0 && <div><div style={{ fontSize:10, color:T.textMuted, fontWeight:700, marginBottom:8 }}>LOCKED</div>{lockedList.map(a=><AchRow key={a.id} a={a} done={false}/>)}</div>}
      </div>
    </div>
  );
}

// ─── SKILLS VIEW ──────────────────────────────────────────────────
const QUEST_CHAINS = []; // removed — skill journeys now serve this purpose

function Skills({ g, nav, seenScreens, markSeen }) {
  const [tab, setTab] = useState("mastery");
  const arc = getArc(g.arc);

  // Build skill mastery map from completed skill journeys
  const skillMastery = useMemo(() => buildSkillMastery(g.skillJourneys), [g.skillJourneys]);

  return (
    <div style={{ paddingBottom:80 }}>
      <Hdr title="Skill Tree" page="skills" seenScreens={seenScreens} markSeen={markSeen} onBack={()=>nav("home")}/>
      <TabBar tabs={[["mastery","Mastery"]]} active={tab} onChange={setTab}/>

      {tab==="mastery" && (
        <div style={{ padding:"12px 16px" }}>
          <div style={{ background:T.card, border:"1px solid "+T.border, borderRadius:10, padding:12, marginBottom:14, fontSize:10, color:T.textSecondary, lineHeight:1.7 }}>
            Complete skill journeys to build mastery in each stat category.
            Completing a journey in a new skill adds to that stat's mastery count.
            Higher tiers grant an XP bonus when you complete a journey in that stat.
            <div style={{ display:"flex", gap:12, marginTop:8, flexWrap:"wrap" }}>
              {MASTERY_TIERS.map(t => (
                <span key={t.tier} style={{ fontSize:9, color:T.textSecondary }}>
                  {t.icon} <span style={{ color:t.color, fontWeight:700 }}>{t.label}</span> {t.threshold}+ journeys {t.mult>1?`(+${Math.round((t.mult-1)*100)}% XP)`:""}
                </span>
              ))}
            </div>
          </div>

          {SKEYS.map(k => {
            const m    = SM[k];
            const data = skillMastery[k] || { count:0, journeys:[] };
            const tier = getMastery(data.count);
            const nextTier = MASTERY_TIERS.find(t => data.count < t.threshold);
            const toNext   = nextTier ? nextTier.threshold - data.count : 0;
            const barMax   = nextTier ? nextTier.threshold : (tier?.threshold||1);
            const activeSkillJs = (g.skillJourneys||[]).filter(j=>(j.stat||"INT")===k && !j.complete);

            return (
              <div key={k} style={{ background:T.card, border:"1px solid "+(tier?tier.color+"44":T.border), borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
                {/* Header */}
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:16 }}>{m.icon}</span>
                    <div>
                      <span style={{ fontSize:13, fontWeight:700, color:m.color }}>{m.label}</span>
                      {tier && <span style={{ fontSize:9, color:tier.color, fontWeight:700, marginLeft:6 }}>{tier.icon} {tier.label}</span>}
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:12, fontWeight:700, color:tier?tier.color:T.textSecondary }}>{data.count}</div>
                    <div style={{ fontSize:8, color:T.textSecondary }}>journeys</div>
                  </div>
                </div>

                {/* Progress bar to next tier */}
                {nextTier && (
                  <div style={{ marginBottom:8 }}>
                    <Bar val={data.count} max={nextTier.threshold} color={m.color} h={5}/>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
                      <span style={{ fontSize:8, color:T.textSecondary }}>{data.count}/{nextTier.threshold} journeys to {nextTier.icon} {nextTier.label}</span>
                      {tier && <span style={{ fontSize:8, color:tier.color }}>+{Math.round((tier.mult-1)*100)}% XP active</span>}
                    </div>
                  </div>
                )}
                {!nextTier && tier && (
                  <div style={{ marginBottom:8 }}>
                    <Bar val={1} max={1} color={T.gold} h={5}/>
                    <div style={{ fontSize:8, color:T.gold, marginTop:3 }}>✦ Master — +{Math.round((tier.mult-1)*100)}% XP on all {m.label} skill journeys</div>
                  </div>
                )}

                {/* Completed skill names */}
                {data.journeys.length > 0 && (
                  <div style={{ marginBottom:data.journeys.length&&activeSkillJs.length?8:0 }}>
                    <div style={{ fontSize:8, color:T.textSecondary, fontWeight:700, marginBottom:4, letterSpacing:"0.06em" }}>COMPLETED</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                      {data.journeys.map((skill,i) => (
                        <span key={i} style={{ fontSize:9, background:m.color+"18", border:"1px solid "+m.color+"33",
                          borderRadius:20, padding:"2px 8px", color:m.color }}>✓ {skill}</span>
                      ))}
                    </div>
                  </div>
                )}

                {/* Active skill journeys in this stat */}
                {activeSkillJs.length > 0 && (
                  <div>
                    <div style={{ fontSize:8, color:T.textSecondary, fontWeight:700, marginBottom:4, letterSpacing:"0.06em" }}>IN PROGRESS</div>
                    {activeSkillJs.map(j => (
                      <div key={j.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                        <span style={{ fontSize:9, color:T.cyan }}>🎯 {j.skill}</span>
                        <div style={{ flex:1 }}><Bar val={j.currentStep} max={j.steps.length} color={T.cyan} h={3}/></div>
                        <span style={{ fontSize:8, color:T.textSecondary }}>{j.currentStep}/{j.steps.length}</span>
                      </div>
                    ))}
                  </div>
                )}

                {data.count === 0 && activeSkillJs.length === 0 && (
                  <div style={{ fontSize:9, color:T.textSecondary, marginTop:4 }}>
                    No {m.label} skill journeys yet. Go to Quest Log → Skill Quests to start one.
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}

        <div style={{ display:"flex", alignItems:"center", gap:5, background:T.gold+"22", border:"1px solid "+T.gold+"44", borderRadius:20, padding:"4px 10px" }}>

        <div style={{ width:40, height:40, borderRadius:10, background:T.gold+"22", border:"1px solid "+T.gold+"44",

        <div style={{ flex:1 }}>
          <div style={{ fontSize:11, fontWeight:700, color:T.gold, marginBottom:2 }}>🎁 Free Daily Item</div>
          <div style={{ fontSize:10, color:T.textSecondary }}>{freeItem.name} — {freeItem.desc}</div>

              <div style={{ width:44, height:44, borderRadius:12, background:item.color+"22", border:"1px solid "+item.color+"44",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>{item.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", gap:5, alignItems:"center", marginBottom:3 }}><div style={{ fontSize:13, fontWeight:700 }}>{item.name}</div><Tag color={rarC[item.rarity]||T.textMuted}>{item.rarity}</Tag></div>
                <div style={{ fontSize:10, color:T.textSecondary, marginBottom:4 }}>{item.desc}</div>
                <div style={{ fontSize:11, fontWeight:700, color:T.gold }}>🪙 {item.cost}</div>

              <div onClick={()=>{ if(!ow&&can) buyItem(item); }} style={{ flexShrink:0,

                color:ow?T.mint:can?T.void:T.textMuted }}>{ow?"Owned":can?"Buy":"Need 🪙"}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

      <Hdr title="Inventory" onBack={()=>nav("home")} right={<span style={{ fontSize:10, color:T.textSecondary }}>{bags.length} items</span>}/>
      <div style={{ padding:"12px 16px" }}>
        {bags.length===0 && (
          <div style={{ textAlign:"center", padding:40, color:T.textMuted }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🎒</div>
            <div style={{ fontSize:13, fontWeight:700, marginBottom:6 }}>Your bag is empty</div>
            <div style={{ fontSize:10 }}>Visit the Shop to get items.</div>
            <div onClick={()=>nav("shop")} style={{ marginTop:16, background:T.cyan, borderRadius:10, padding:11, color:T.void, fontWeight:700, cursor:"pointer", fontSize:11 }}>Go to Shop</div>
          </div>

// ─── APP ROOT ─────────────────────────────────────────────────────
function App() {
  const game = useGame();
  const { g, loaded, startGame, loadGame, setChosen, resetQs, addQs, refreshQs, refreshBQ,
    addSkillQ, updateSkillJourney, addCustomQ, completeQ, completeJourneyStep, addJourney, clearBD, saveCheckin, saveDR,
    completeGoal, setGoals,
    setGoalDeadline, delQ, setQD, setBQD, markLoreRead, buyItem, claimFree,
    equipItem, useItem, resetGame, switchAcc,
    notify, toast, achPopup, setAchPopup, setG } = game;
  const [view,setView]         = useState("home");
  const [showQuiz,setShowQuiz] = useState(false);
  const [pendingGoal, setPendingGoal]       = useState(null);
  const [pendingDeadline, setPendingDeadline] = useState("");
  // seenScreens persisted in game state — only auto-show info once per account ever
  const seenScreens = useMemo(() => new Set(g?.seenScreens||[]), [g?.seenScreens]);
  const markSeen = useCallback(page => {
    setG(prev => {
      if (!prev) return prev;
      const already = prev.seenScreens||[];
      if (already.includes(page)) return prev;
      const next = {...prev, seenScreens:[...already, page]};
      persist(next);
      return next;
    });
  }, [setG]);
  const nav = useCallback(v => setView(v), []);

  // Parallel journey recovery — fires once on load if goals exist but journeys are missing
  // (e.g. new device load, migrated save). Uses concurrency-2 so API isn't hammered.
  const recoveryFired = useRef(false);
  useEffect(() => {
    if (!g || recoveryFired.current) return;
    const missing = (g.mainGoals||[]).filter(goalText =>
      goalText && !(g.journeys||[]).some(j => j.goalText === goalText)
    );
    if (missing.length === 0) return;
    if (!(g.quizAnswers||[]).length) return; // no quiz data yet — normal onboarding will handle it
    recoveryFired.current = true;
    const arc = getArc(g.arc);
    const quizSummary = (g.quizAnswers||[]).map((a,i)=>`A${i+1}: ${a}`).join("\n");
    parallelLimit(missing.map(goalText => async () => {
      try {
        const dl = (g.goalDeadlines||{})[goalText] || "";
        const raw = await genJourney(goalText, arc.name, quizSummary, [], dl);
        const journey = {
          id:`j_rec_${Date.now()}_${Math.random().toString(36).slice(2)}`,
          goalText, stat:statOf(goalText)||arc.stat,
          icon:getJourneyIcon(statOf(goalText)||arc.stat),
          steps:raw.map((s,i)=>({id:`jrs_${i}_${Date.now()}`,title:s.title,xp:Number(s.xp)||50,coins:Number(s.coins)||12,done:false,doneDate:null,note:""})),
          currentStep:0, complete:false, generatedAt:today(),
        };
        setG(p => {
          if (!p) return p;
          if ((p.journeys||[]).some(j=>j.goalText===goalText)) return p; // already added
          const newJs = [...(p.journeys||[]), journey];
          const activeCount = newJs.filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length;
          const prevActive  = (p.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length;
          const needsBossUpdate = (activeCount>=3?7:activeCount>=2?5:3) > (prevActive>=3?7:prevActive>=2?5:3);
          const n = { ...p, journeys:newJs, ...(needsBossUpdate?{bossQs:getBossQuests(p.arc,activeCount),bqDone:{}}:{}) };
          persist(n); return n;
        });
      } catch(_) {} // silent — user can retry by re-saving the goal
    }), 2);
  }, [g?.un]); // only re-run if the account changes

  // Chronicle check
  const showChronicle = useMemo(() => {
    if (!g || g.chronicleShown) return false;
    const days = Math.floor((Date.now()-new Date(g.firstPlayDate||Date.now()).getTime())/86400000);
    return days >= 30;
  }, [g?.firstPlayDate, g?.chronicleShown]);
  const dismissChronicle = useCallback(() => {
    setG(prev => { if(!prev)return prev; const s={...prev,chronicleShown:true}; persist(s); return s; });
  }, []);

  // Goal saved → always show quiz for it (accumulates answers, deduplicates questions)
  const onFirstGoalSaved = useCallback((goals, deadline) => {
    if (!g) return;
    const goalText = goals[0];
    if (!goalText) return;
    if ((g.journeys||[]).some(j => j.goalText === goalText)) return; // already has journey
    setPendingGoal(goalText);
    setPendingDeadline(deadline||"");
    setShowQuiz(true);
  }, [g]);

  // Quiz complete → store answers, generate journey for this goal only
  // Uses a ref to hold pending generation so navigation away doesn't lose it
  const genInFlight = useRef(false);
  const onQuizComplete = useCallback(async (answers, askedQs) => {
    setShowQuiz(false);
    const goalText = pendingGoal;
    const deadline = pendingDeadline;
    if (!g || !goalText) return;
    if (genInFlight.current) return;
    genInFlight.current = true;

    // 1. Immediately save quiz answers to state
    const newAnswers = [...(g.quizAnswers||[]), ...answers];
    const newAsked   = [...(g.askedQuestions||[]), ...(askedQs||[])];
    setG(prev => {
      if (!prev) return prev;
      const next = {...prev, quizAnswers:newAnswers, askedQuestions:newAsked};
      persist(next);
      return next;
    });

    nav("home");

    // 2. Generate journey in background — setG is safe to call after navigation
    try {
      const arc = getArc(g.arc);
      const quizSummary = newAnswers.map((a,i)=>`A${i+1}: ${a}`).join("\n");
      const dl = deadline || (g.goalDeadlines||{})[goalText] || "";
      const raw = await genJourney(goalText, arc.name, quizSummary, [], dl);
      const journey = {
        id:`j_${Date.now()}`, goalText,
        stat:statOf(goalText)||arc.stat,
        icon:getJourneyIcon(statOf(goalText)||arc.stat),
        steps:raw.map((s,i)=>({id:`js_${Date.now()}_${i}`,title:s.title,xp:Number(s.xp)||50,coins:Number(s.coins)||12,done:false,doneDate:null,note:""})),
        currentStep:0, complete:false, generatedAt:today(),
      };
      setG(p => {
        if(!p) return p;
        // Don't duplicate if already added
        if ((p.journeys||[]).some(j=>j.goalText===goalText)) return p;
        const newJourneys = [...(p.journeys||[]), journey];
        const n = { ...p, journeys: newJourneys };
        persist(n); return n;
      });

      // 3. Always regenerate boss quests with AI after a new journey/goal
      setG(p => {
        if (!p) return p;
        const activeCount = (p.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length).length;
        const count = activeCount >= 3 ? 7 : activeCount >= 2 ? 5 : 3;
        const arc2 = getArc(p.arc);
        genBossQuestsAI(arc2.name, arc2.stat, p.mainGoals||[], getBoss(p.arc, p.bossIdx||0).name,
          getBoss(p.arc, p.bossIdx||0).lore, (p.bossIdx||0)+1, count,
          (p.journeys||[]).filter(j=>!j.complete&&j.currentStep<(j.steps||[]).length),
          p.quizAnswers||[])
          .then(qs => setG(prev => {
            if(!prev) return prev;
            const n = {...prev, bossQs:qs, bqDone:{}};
            persist(n); return n;
          }))
          .catch(() => {}); // silently keep existing quests if AI fails
        return p; // return unchanged state immediately, AI updates async
      });
    } catch(_) {
      // Generation failed silently — user can retry by re-adding the goal
    } finally {
      genInFlight.current = false;
    }
  }, [g, pendingGoal, pendingDeadline, nav, setG]);

  if (!loaded) return (
    <div style={{ background:T.void, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ fontSize:40 }}>⚔️</div>
    </div>
  );

  if (!g) return (
    <div style={{ background:T.void, maxWidth:500, margin:"0 auto", minHeight:"100vh" }}>
      <Onboarding onComplete={(char,un,saved,pin) => {
        if (saved) { loadGame(saved); return; }
        startGame({...char, pin, goals:[], quizAnswers:null}, un);
        setView("goals");
      }}/>
    </div>
  );

  // Show quiz overlay if triggered from Goals
  if (showQuiz && pendingGoal) return (
    <div style={{ background:T.void, maxWidth:500, margin:"0 auto", minHeight:"100vh", display:"flex", flexDirection:"column", color:T.textPrimary, fontFamily:"system-ui,sans-serif" }}>
      <style>{"*{box-sizing:border-box;}"}</style>
      <div style={{ background:T.panel, borderBottom:"1px solid "+T.border, padding:"12px 16px" }}>
        <div style={{ fontSize:14, fontWeight:700 }}>🔬 Understanding Your Goal</div>
        <div style={{ fontSize:10, color:T.textSecondary }}>5 quick questions — shapes your journey steps</div>
      </div>
      <GoalQuiz goalText={pendingGoal} arcName={getArc(g.arc).name} previousQuestions={g?.askedQuestions||[]} onComplete={onQuizComplete} onBack={()=>setShowQuiz(false)}/>
    </div>
  );

  const needsCheckin = !g.checkin || g.checkin.date !== today();
  const ss = seenScreens; const ms = markSeen;

  const views = {
    home:         <Home g={g} nav={nav} switchAcc={switchAcc} saveCheckin={saveCheckin} saveDR={saveDR} notify={notify} completeJourneyStep={completeJourneyStep} seenScreens={ss} markSeen={ms}/>,
    quests:       <Quests g={g} completeQ={completeQ} completeJourneyStep={completeJourneyStep} delQ={delQ} setQD={setQD} addCustomQ={addCustomQ} addSkillQ={addSkillQ} updateSkillJourney={updateSkillJourney} setChosen={setChosen} resetQs={resetQs} addQs={addQs} refreshQs={refreshQs} nav={nav} seenScreens={ss} markSeen={ms}/>,
    coach:        <Coach g={g} nav={nav} seenScreens={ss} markSeen={ms}/>,
    boss:         <Boss g={g} completeQ={completeQ} setBQD={setBQD} refreshBQ={refreshBQ} clearBD={clearBD} markLoreRead={markLoreRead} nav={nav} seenScreens={ss} markSeen={ms} setG={setG}/>,
    profile:      <Profile g={g} nav={nav} resetGame={resetGame} switchAcc={switchAcc} setChosen={setChosen} setG={setG} seenScreens={ss} markSeen={ms}/>,
    inventory:    <Inventory g={g} equipItem={equipItem} useItem={useItem} nav={nav} seenScreens={ss} markSeen={ms}/>,
    shop:         <Shop g={g} buyItem={buyItem} claimFree={claimFree} nav={nav} seenScreens={ss} markSeen={ms}/>,
    settings:     <Settings g={g} nav={nav} resetGame={resetGame} switchAcc={switchAcc} seenScreens={ss} markSeen={ms}/>,
    goals:        <Goals g={g} setGoals={setGoals} completeGoal={completeGoal} setGoalDeadline={setGoalDeadline} nav={nav} onFirstGoalSaved={onFirstGoalSaved} seenScreens={ss} markSeen={ms} setG={setG}/>,
    achievements: <Achievements g={g} nav={nav} seenScreens={ss} markSeen={ms}/>,
  };

  return (
    <div style={{ background:T.void, maxWidth:500, margin:"0 auto", minHeight:"100vh", color:T.textPrimary, fontFamily:"system-ui,sans-serif", position:"relative" }}>
      <style>{"*{box-sizing:border-box;}input,textarea{color:#F0EEF8;outline:none;}input::placeholder,textarea::placeholder{opacity:0.5;}input[type='date']{color-scheme:dark;}"}</style>
      {showChronicle && <Chronicle g={g} onClose={dismissChronicle}/>}
      {needsCheckin && !showChronicle && <Checkin g={g} onDone={saveCheckin}/>}
      <div style={{ overflowY:"auto", maxHeight:"100vh", paddingBottom:70 }}>{views[view]||views.home}</div>
      <NavBar view={view} nav={nav}/>
      {toast && <Toast msg={toast}/>}
      {achPopup && <AchievementPopup achievement={achPopup} onClose={()=>setAchPopup(null)}/>}
    </div>
  );
}



// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
